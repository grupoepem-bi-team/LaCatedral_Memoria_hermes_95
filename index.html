<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Catedral — Mapa del Ecosistema Hermes .95</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root { --oro: #d4af37; --pergamino: #f3e5ab; --piedra: #1a1a22; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100vw; height:100vh; overflow:hidden; background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a0f 60%, #050508 100%); color: var(--pergamino); font-family: 'Georgia', serif; }

/* SVG Background — Catedral */
#cathedral-bg { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; }

/* Grafo principal */
#grafo { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:1; }

/* Panel info */
#info-panel {
    position:fixed; top:20px; left:20px; width:280px;
    background: rgba(10,10,15,0.92); border: 1px solid rgba(212,175,55,0.3);
    border-radius: 8px; padding: 16px; z-index:20;
    backdrop-filter: blur(8px); font-size: 0.8rem;
}
#info-panel h1 { color: var(--oro); font-size: 1.1rem; margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase; }
#info-panel .stat { display:flex; justify-content:space-between; padding: 4px 0; border-bottom: 1px solid rgba(212,175,55,0.08); }
#info-panel .stat .val { color: var(--oro); font-weight: bold; }
#info-panel .legend { margin-top: 12px; }
#info-panel .legend-item { display:flex; align-items:center; gap: 8px; padding: 3px 0; font-size: 0.75rem; }
#info-panel .dot { width: 10px; height: 10px; border-radius: 50%; }

/* Tooltip */
.tooltip {
    position:fixed; padding: 14px 18px; background: rgba(16,14,10,0.97);
    border: 1px solid var(--oro); border-radius: 8px; font-size: 0.82rem;
    color: var(--pergamino); max-width: 320px; z-index: 100; pointer-events:none;
    opacity:0; transition: opacity 0.2s; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.tooltip h4 { color: var(--oro); margin-bottom: 6px; font-size: 0.95rem; letter-spacing: 1px; }
.tooltip .meta { color: #a89b7a; font-size: 0.7rem; margin-bottom: 6px; }

/* Nodos */
.node-server { cursor: pointer; }
.node-server circle { stroke: var(--oro); stroke-width: 2; fill-opacity: 0.15; }
.node-server text { fill: var(--oro); font-size: 12px; font-weight: bold; text-anchor: middle; text-shadow: 0 2px 4px black; letter-spacing: 1px; }

.node-subsystem circle { stroke-width: 1.5; fill-opacity: 0.25; }
.node-subsystem text { fill: var(--pergamino); font-size: 9px; text-anchor: middle; text-shadow: 0 2px 4px black; }

.node-cron circle { stroke-width: 1; fill-opacity: 0.3; }
.node-cron text { fill: #aaa; font-size: 7px; text-anchor: middle; }

/* Links */
.link-flow { stroke-opacity: 0.4; stroke-width: 1.5; fill: none; }
.link-replica { stroke: #2e7d32; stroke-dasharray: 5,5; }
.link-restore { stroke: #1565c0; stroke-dasharray: 3,3; }
.link-ssh { stroke: #888; stroke-width: 1; }
.link-notify { stroke: #d4af37; stroke-width: 2; }

/* Animacion pulso */
@keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
.pulsing { animation: pulse 2s infinite; }

/* Controles */
.controls {
    position:fixed; bottom:20px; right:20px; z-index:20;
    display:flex; gap:8px;
}
.controls button {
    background: rgba(10,10,15,0.9); border: 1px solid var(--oro-ten);
    color: var(--oro); padding: 8px 16px; border-radius: 4px;
    cursor: pointer; font-family: Georgia, serif; font-size: 0.8rem;
}
.controls button:hover { background: rgba(212,175,55,0.15); }
</style>
</head>
<body>

<!-- Background SVG — Catedral arquitectonica -->
<svg id="cathedral-bg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="piedra" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#2a2a35"/><stop offset="100%" stop-color="#0f0f16"/>
        </linearGradient>
        <linearGradient id="oro-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffd700"/><stop offset="100%" stop-color="#b8860b"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    
    <!-- Suelo 3D -->
    <polygon points="0,720 1280,720 900,520 380,520" fill="url(#piedra)" opacity="0.4"/>
    <path d="M 380 520 L 0 720 M 380 520 L 1280 720 M 0 640 L 1280 640" stroke="rgba(212,175,55,0.08)" stroke-width="1"/>
    
    <!-- Pilares laterales -->
    <g id="pilar-izq">
        <rect x="30" y="0" width="90" height="720" fill="url(#piedra)"/>
        <rect x="25" y="0" width="100" height="50" fill="#2a2a35" rx="4"/>
        <rect x="25" y="670" width="100" height="50" fill="#2a2a35" rx="4"/>
        <rect x="40" y="80" width="70" height="30" fill="url(#oro-grad)" rx="4"/>
        <text x="75" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a22">HERMES .95</text>
    </g>
    
    <g id="pilar-der">
        <rect x="1160" y="0" width="90" height="720" fill="url(#piedra)"/>
        <rect x="1155" y="0" width="100" height="50" fill="#2a2a35" rx="4"/>
        <rect x="1155" y="670" width="100" height="50" fill="#2a2a35" rx="4"/>
    </g>
    
    <!-- Boveda cruceria -->
    <g stroke="rgba(212,175,55,0.12)" stroke-width="2" fill="none">
        <path d="M 120 0 Q 640 350 1160 0"/>
        <path d="M 120 0 L 1160 720 M 1160 0 L 120 720"/>
        <path d="M 120 200 Q 640 100 1160 200"/>
        <path d="M 120 400 Q 640 300 1160 400"/>
    </g>
    
    <!-- Roseton -->
    <g transform="translate(640,80)">
        <circle cx="0" cy="0" r="55" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="2"/>
        <circle cx="0" cy="0" r="40" fill="none" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>
        <g stroke="rgba(212,175,55,0.2)" stroke-width="1">
            <line x1="0" y1="-55" x2="0" y2="55"/>
            <line x1="-55" y1="0" x2="55" y2="0"/>
            <line x1="-39" y1="-39" x2="39" y2="39"/>
            <line x1="39" y1="-39" x2="-39" y2="39"/>
        </g>
    </g>
    
    <!-- Estrellas -->
    <g fill="rgba(255,235,180,0.4)">
        <circle cx="300" cy="60" r="1.5"/><circle cx="900" cy="40" r="1.2"/>
        <circle cx="500" cy="30" r="1"/><circle cx="700" cy="70" r="1.3"/>
    </g>
</svg>

<!-- Grafo principal -->
<svg id="grafo"></svg>

<!-- Panel info -->
<div id="info-panel">
    <h1>La Catedral</h1>
    <div class="stat"><span>Ecosistema</span><span class="val">Hermes .95</span></div>
    <div class="stat"><span>Servidores</span><span class="val">7</span></div>
    <div class="stat"><span>Subsistemas</span><span class="val">7</span></div>
    <div class="stat"><span>Cron Jobs</span><span class="val">6</span></div>
    <div class="stat"><span>Skills</span><span class="val">87</span></div>
    <div class="stat"><span>Ultimo update</span><span class="val">13:53</span></div>
    
    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#d4af37"></div> Servidor</div>
        <div class="legend-item"><div class="dot" style="background:#ffd700"></div> Subsistema</div>
        <div class="legend-item"><div class="dot" style="background:#ff9800"></div> Cron Job</div>
        <div class="legend-item"><div class="dot" style="background:#2e7d32"></div> Replica MySQL</div>
        <div class="legend-item"><div class="dot" style="background:#1565c0"></div> Restore</div>
        <div class="legend-item"><div class="dot" style="background:#d4af37"></div> Notificacion</div>
    </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Controles -->
<div class="controls">
    <button onclick="resetZoom()">Centrar</button>
    <button onclick="toggleFlows()">Flujos</button>
</div>

<script>
const DATA = {"meta": {"generated_at": "2026-07-10T13:53:46.261871"}, "servers": [{"id": "srv-95", "name": "HERMES .95", "type": "server", "role": "Controlador central", "status": "online", "color": "#d4af37", "x": 0.5, "y": 0.5, "r": 45}, {"id": "srv-250", "name": "PROD .250", "type": "server", "role": "Produccion MySQL", "status": "online", "color": "#2e7d32", "x": 0.2, "y": 0.2, "r": 35}, {"id": "srv-241", "name": "ESPEJO .241", "type": "server", "role": "Replica nativa .250", "status": "online", "color": "#1565c0", "x": 0.8, "y": 0.2, "r": 35}, {"id": "srv-240", "name": "STAGING .240", "type": "server", "role": "Staging legacy", "status": "online", "color": "#7b1fa2", "x": 0.15, "y": 0.7, "r": 30}, {"id": "srv-99", "name": "STAGING .99", "type": "server", "role": "Staging nuevo (MySQL 8.4)", "status": "online", "color": "#00838f", "x": 0.35, "y": 0.75, "r": 30}, {"id": "srv-50", "name": "BACKUP .50", "type": "server", "role": "Backups ZIP", "status": "online", "color": "#c62828", "x": 0.65, "y": 0.75, "r": 28}, {"id": "srv-43", "name": "RDP .43", "type": "server", "role": "Acceso remoto", "status": "online", "color": "#ef6c00", "x": 0.85, "y": 0.7, "r": 28}], "subsystems": [{"id": "sub-catedral", "name": "La Catedral", "type": "subsystem", "parent": "srv-95", "desc": "Deep Memory + Dashboard visual", "color": "#ffd700", "r": 22}, {"id": "sub-telegram", "name": "Telegram Bot", "type": "subsystem", "parent": "srv-95", "desc": "Notificaciones via sendRichMessage", "color": "#0088cc", "r": 18}, {"id": "sub-cron", "name": "Cron Jobs", "type": "subsystem", "parent": "srv-95", "desc": "6 jobs activos (monitor, sync, detect)", "color": "#ff9800", "r": 20}, {"id": "sub-skills", "name": "Skills Manager", "type": "subsystem", "parent": "srv-95", "desc": "87 skills en 14 categorias", "color": "#4caf50", "r": 20}, {"id": "sub-indices", "name": "Indices Tematicos", "type": "subsystem", "parent": "srv-95", "desc": "5 estantes de conocimiento", "color": "#9c27b0", "r": 18}, {"id": "sub-vault", "name": "Vault", "type": "subsystem", "parent": "srv-95", "desc": "Gestion segura de credenciales", "color": "#607d8b", "r": 16}, {"id": "sub-memoria", "name": "Memoria Contextual", "type": "subsystem", "parent": "srv-95", "desc": "MEMORY.md + USER.md", "color": "#795548", "r": 16}], "cronjobs": [{"id": "cron-restore", "name": "Monitor Restore .99", "type": "cron", "parent": "sub-cron", "schedule": "*/10 * * * *", "status": "active", "r": 10}, {"id": "cron-sync", "name": "Sync Nocturno", "type": "cron", "parent": "sub-cron", "schedule": "0 3 * * *", "status": "active", "r": 10}, {"id": "cron-rebuild", "name": "Rebuild Dashboard", "type": "cron", "parent": "sub-cron", "schedule": "5 3 * * *", "status": "active", "r": 10}, {"id": "cron-detector", "name": "Detector Espejo", "type": "cron", "parent": "sub-cron", "schedule": "0 9 * * *", "status": "active", "r": 10}, {"id": "cron-backup", "name": "Verificar Backup", "type": "cron", "parent": "sub-cron", "schedule": "0 5-8 * * *", "status": "active", "r": 10}, {"id": "cron-rdp", "name": "Recordatorio RDP", "type": "cron", "parent": "sub-cron", "schedule": "once", "status": "pending", "r": 8}], "skills": [], "indices": [], "links": [], "flows": [{"source": "srv-250", "target": "srv-241", "type": "replica", "label": "MySQL nativa"}, {"source": "srv-250", "target": "srv-99", "type": "restore", "label": "Restore pipeline"}, {"source": "srv-50", "target": "srv-99", "type": "backup", "label": "ZIP backup"}, {"source": "srv-95", "target": "srv-240", "type": "ssh", "label": "SSH diagnostico"}, {"source": "srv-95", "target": "srv-241", "type": "ssh", "label": "SSH detector"}, {"source": "srv-95", "target": "srv-99", "type": "ssh", "label": "SSH monitor"}, {"source": "sub-catedral", "target": "sub-telegram", "type": "notify", "label": "sendRichMessage"}, {"source": "sub-cron", "target": "sub-telegram", "type": "notify", "label": "Alertas"}, {"source": "sub-catedral", "target": "srv-250", "type": "data", "label": "MySQL audit"}, {"source": "sub-catedral", "target": "srv-241", "type": "data", "label": "Replica status"}]};
const width = window.innerWidth;
const height = window.innerHeight;
const svg = d3.select("#grafo").attr("viewBox", [0, 0, width, height]);
const g = svg.append('g');

// Zoom
const zoom = d3.zoom().scaleExtent([0.3, 3]).on('zoom', (e) => g.attr('transform', e.transform));
svg.call(zoom);

// === POSICIONES ===
// Servidores en circulo alrededor del centro
const servers = DATA.servers.map((d, i) => {
    const angle = (2 * Math.PI / DATA.servers.length) * i - Math.PI / 2;
    d.x = width/2 + Math.cos(angle) * Math.min(width, height) * 0.35;
    d.y = height/2 + Math.sin(angle) * Math.min(width, height) * 0.3;
    return d;
});

// Subsistemas orbitando HERMES .95 (el centro)
const center = servers.find(s => s.id === 'srv-95');
const subsystems = DATA.subsystems.map((d, i) => {
    const angle = (2 * Math.PI / DATA.subsystems.length) * i - Math.PI / 2 + 0.3;
    d.x = center.x + Math.cos(angle) * 140;
    d.y = center.y + Math.sin(angle) * 100;
    return d;
});

// Cron jobs orbitando el subsistema de cron
const cronNode = subsystems.find(s => s.id === 'sub-cron');
const cronjobs = DATA.cronjobs.map((d, i) => {
    const angle = (2 * Math.PI / DATA.cronjobs.length) * i - Math.PI / 2;
    d.x = cronNode.x + Math.cos(angle) * 60;
    d.y = cronNode.y + Math.sin(angle) * 45;
    return d;
});

const allNodes = [...servers, ...subsystems, ...cronjobs];

// === LINKS ===
const links = [];
DATA.flows.forEach(f => {
    const source = allNodes.find(n => n.id === f.source);
    const target = allNodes.find(n => n.id === f.target);
    if (source && target) links.push({...f, source, target});
});

// === RENDER LINKS ===
const linkSel = g.append('g').selectAll('line').data(links).join('line')
    .attr('class', d => `link-flow link-${d.type}`)
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

// === RENDER NODOS ===
const nodeGroup = g.append('g').selectAll('g').data(allNodes).join('g')
    .attr('class', d => `node-${d.type}`)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer');

// Circulos
nodeGroup.append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => d.type === 'server' ? 'rgba(0,0,0,0.3)' : d.color)
    .attr('fill-opacity', d => d.type === 'server' ? 0.2 : 0.6)
    .attr('stroke', d => d.color)
    .attr('stroke-width', d => d.type === 'server' ? 2.5 : 1.5)
    .attr('stroke-opacity', 0.8);

// Glow para servidores
nodeGroup.filter(d => d.type === 'server')
    .append('circle').attr('r', d => d.r + 10)
    .attr('fill', 'none').attr('stroke', d => d.color)
    .attr('stroke-width', 1).attr('stroke-opacity', 0.15)
    .attr('stroke-dasharray', '4,8');

// Labels
nodeGroup.filter(d => d.type === 'server')
    .append('text').attr('dy', d => d.r + 18).text(d => d.name);

nodeGroup.filter(d => d.type === 'subsystem')
    .append('text').attr('dy', d => d.r + 12).attr('fill', '#f3e5ab').attr('font-size', '9px').text(d => d.name);

nodeGroup.filter(d => d.type === 'cron')
    .append('text').attr('dy', d => d.r + 10).attr('fill', '#aaa').attr('font-size', '7px').text(d => d.name);

// === INTERACCIONES ===
const tooltip = d3.select("#tooltip");

nodeGroup.on('mouseover', function(event, d) {
    d3.select(this).select('circle').attr('stroke-width', 4);
    linkSel.attr('stroke-opacity', l => (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.05);
    
    let html = '';
    if (d.type === 'server') {
        html = `<h4>${d.name}</h4><div class="meta">${d.role}</div>`;
    } else if (d.type === 'subsystem') {
        html = `<h4>${d.name}</h4><div class="meta">${d.desc}</div>`;
    } else if (d.type === 'cron') {
        html = `<h4>${d.name}</h4><div class="meta">Schedule: ${d.schedule}</div>`;
    }
    
    tooltip.html(html)
        .style('opacity', 1)
        .style('left', Math.min(event.pageX + 14, window.innerWidth - 340) + 'px')
        .style('top', Math.min(event.pageY + 14, window.innerHeight - 120) + 'px');
})
.on('mouseout', function() {
    d3.select(this).select('circle').attr('stroke-width', d => d.type === 'server' ? 2.5 : 1.5);
    linkSel.attr('stroke-opacity', 0.4);
    tooltip.style('opacity', 0);
})
.on('click', function(event, d) {
    const scale = d.type === 'server' ? 1.5 : 2.5;
    svg.transition().duration(600).call(zoom.transform,
        d3.zoomIdentity.translate(width/2 - d.x*scale, height/2 - d.y*scale).scale(scale));
});

// === CONTROLES ===
window.resetZoom = function() {
    svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity);
};

let flowsVisible = true;
window.toggleFlows = function() {
    flowsVisible = !flowsVisible;
    linkSel.transition().duration(300).attr('opacity', flowsVisible ? 1 : 0);
};
</script>
</body>
</html>
