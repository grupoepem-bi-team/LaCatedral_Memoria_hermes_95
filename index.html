});

// === POSICIONES COMPONENTES (orbitando su servidor) ===
const components = DATA.components.map((c, i) => {
    const srv = servers.find(s => s.id === c.server);
    if (srv) {
        const srvComps = DATA.components.filter(x => x.server === c.server);
        const count = srvComps.length;
        const idx = srvComps.indexOf(c);
        const angle = (2 * Math.PI / count) * idx + (srv.isCenter ? 0 : Math.PI / 4);
        const dist = srv.isCenter ? 140 : 90;
        c.x = srv.x + Math.cos(angle) * dist;
        c.y = srv.y + Math.sin(angle) * dist;
        c.parentServer = srv;
    }
    return c;
});

// === CANALES ENTRE SERVIDORES ===
const flows = DATA.flows.map(f => {
    const from = servers.find(s => s.id === f.from);
    const to = servers.find(s => s.id === f.to);
    if (from && to) {
        f.x1 = from.x; f.y1 = from.y;
        f.x2 = to.x; f.y2 = to.y;
        f.midX = (from.x + to.x) / 2;
        f.midY = (from.y + to.y) / 2 - 30;
    }
    return f;
});

// === RENDER CANALES ===
const channelPath = d3.line().curve(d3.curveBasis);

flows.forEach((f, i) => {
    if (!f.x1) return;
    const pathData = [[f.x1, f.y1], [f.midX, f.midY], [f.x2, f.y2]];
    
    g.append('path')
        .attr('d', channelPath(pathData))
        .attr('stroke', 'rgba(212,175,55,0.12)')
        .attr('stroke-width', 2)
        .attr('fill', 'none');
    
    const particle = g.append('circle')
        .attr('r', 3)
        .attr('fill', f.type === 'replica' ? '#4caf50' : f.type === 'telegram' ? '#d4af37' : '#2196f3');
    
    let progress = i * 0.3;
    function animate() {
        progress += 0.008;
        if (progress > 1) progress = 0;
        const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pathEl.setAttribute('d', channelPath(pathData));
        const len = pathEl.getTotalLength();
        const point = pathEl.getPointAtLength(progress * len);
        particle.attr('cx', point.x).attr('cy', point.y)
            .attr('opacity', 0.3 + Math.sin(progress * Math.PI * 2) * 0.7);
        requestAnimationFrame(animate);
    }
    animate();
    
    g.append('text')
        .attr('x', f.midX).attr('y', f.midY - 8)
        .attr('class', 'channel-label')
        .text(f.icon + ' ' + f.name);
});

// === RENDER CONEXIONES SERVIDOR -> COMPONENTE ===
components.forEach(c => {
    if (!c.parentServer) return;
    g.append('line')
        .attr('x1', c.parentServer.x).attr('y1', c.parentServer.y)
        .attr('x2', c.x).attr('y2', c.y)
        .attr('stroke', 'rgba(212,175,55,0.08)')
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '4,4');
});

// === RENDER COMPONENTES ===
const compGroup = g.selectAll('.comp-node').data(components).join('g')
    .attr('class', 'comp-node')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer');

compGroup.append('circle')
    .attr('r', 22)
    .attr('fill', 'rgba(30,30,40,0.9)')
    .attr('stroke', d => d.parentServer ? d.parentServer.color : '#666')
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.5);

compGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', 4)
    .attr('font-size', '14px')
    .text(d => d.icon);

compGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', -28)
    .attr('fill', '#aaa').attr('font-size', '8px')
    .text(d => d.name.length > 18 ? d.name.slice(0,18)+'...' : d.name);

// === RENDER SERVIDORES (encima) ===
const serverGroup = g.selectAll('.server-node').data(servers).join('g')
    .attr('class', 'server-node')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer');

serverGroup.append('circle')
    .attr('r', d => d.isCenter ? 70 : 50)
    .attr('fill', d => d.status === 'online' ? 'rgba(76,175,80,0.05)' : 'rgba(244,67,54,0.05)')
    .attr('stroke', d => d.color)
    .attr('stroke-width', d => d.isCenter ? 3 : 2)
    .attr('stroke-opacity', 0.6)
    .attr('stroke-dasharray', d => d.status === 'online' ? 'none' : '8,4');

serverGroup.append('circle')
    .attr('r', d => d.isCenter ? 55 : 40)
    .attr('fill', 'rgba(10,10,15,0.85)')
    .attr('stroke', d => d.color)
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.3);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? -12 : -8)
    .attr('font-size', d => d.isCenter ? '2rem' : '1.5rem')
    .text(d => d.icon);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? 18 : 14)
    .attr('fill', '#fff').attr('font-size', d => d.isCenter ? '13px' : '11px')
    .attr('font-weight', 'bold').attr('letter-spacing', '1px')
    .text(d => d.name);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? 34 : 26)
    .attr('fill', d => d.status === 'online' ? '#4caf50' : '#f44336')
    .attr('font-size', '9px')
    .text(d => d.status);

// === INTERACCIONES SERVIDOR ===
serverGroup.on('mouseover', function(event, d) {
    d3.select(this).select('circle').attr('stroke-width', 4).attr('stroke-opacity', 1);
    const servicesHtml = d.services.map(s => `<span>${s}</span>`).join('');
    tooltip.html(`
        <div class="tt-title">${d.icon} ${d.name}</div>
        <div class="tt-desc">${d.desc}</div>
        <div class="tt-meta">IP: ${d.ip} | Estado: ${d.status}</div>
        <div class="tt-services">${servicesHtml}</div>
    `).style('opacity', 1)
    .style('left', Math.min(event.pageX + 16, window.innerWidth - 420) + 'px')
    .style('top', Math.min(event.pageY + 16, window.innerHeight - 200) + 'px');
})
.on('mouseout', function() {
    d3.select(this).select('circle').attr('stroke-width', d => d.isCenter ? 3 : 2).attr('stroke-opacity', 0.6);
    tooltip.style('opacity', 0);
})
.on('click', function(event, d) {
    highlightServer(d.id);
    const scale = d.isCenter ? 1.5 : 2.2;
    svg.transition().duration(600).call(zoom.transform,
        d3.zoomIdentity.translate(width/2 - d.x*scale, height/2 - d.y*scale).scale(scale));
});

// === INTERACCIONES COMPONENTE ===
compGroup.on('mouseover', function(event, d) {
    d3.select(this).select('circle').attr('stroke-width', 3).attr('stroke-opacity', 0.8);
    tooltip.html(`
        <div class="tt-title">${d.icon} ${d.name}</div>
        <div class="tt-desc">${d.human_desc}</div>
        <div class="tt-meta">Servidor: ${d.parentServer.name} | Schedule: ${d.schedule}</div>
    `).style('opacity', 1)
    .style('left', Math.min(event.pageX + 16, window.innerWidth - 420) + 'px')
    .style('top', Math.min(event.pageY + 16, window.innerHeight - 200) + 'px');
})
.on('mouseout', function() {
    d3.select(this).select('circle').attr('stroke-width', 1.5).attr('stroke-opacity', 0.5);
    tooltip.style('opacity', 0);
})
.on('click', function(event, d) {
    toggleSubtasks(d.id);
});

// === PANEL LATERAL POR SERVIDOR ===
function renderPanel() {
    const container = document.getElementById('server-sections');
    container.innerHTML = DATA.servers.map(srv => {
        const srvComps = DATA.components.filter(c => c.server === srv.id);
        const compCount = srvComps.length;
        const subtaskCount = srvComps.reduce((sum, c) => sum + (c.subtasks ? c.subtasks.length : 0), 0);
        
        return `
            <div class="server-section" id="section-${srv.id}">
                <div class="server-section-header" onclick="toggleSection('${srv.id}')">
                    <span class="sh-icon">${srv.icon}</span>
                    <span class="sh-name">${srv.name}</span>
                    <span class="sh-count">${compCount} comp · ${subtaskCount} subs</span>
                    <span class="sh-status ${srv.status}">${srv.status}</span>
                </div>
                <div class="server-section-body ${srv.id === 'srv-95' ? 'visible' : ''}" id="section-body-${srv.id}">
                    <div style="font-size:0.75rem;color:#999;margin:8px 0;">${srv.desc}</div>
                    ${srvComps.map(c => `
                        <div class="comp-card" id="comp-${c.id}" onclick="event.stopPropagation(); toggleSubtasks('${c.id}')">
                            <div class="comp-header">
                                <span>${c.icon}</span>
                                <span class="comp-name">${c.name}</span>
                                <span class="expand-icon">&#9654;</span>
                            </div>
                            <div class="comp-desc">${c.human_desc}</div>
                            <div class="comp-meta">&#9201; ${c.schedule} | Ultima: ${c.last_run} | ${c.subtasks.length} subtareas</div>
                            <div class="subtasks-container" id="subtasks-${c.id}">
                                ${c.subtasks.map(st => `
                                    <div class="subtask">
                                        <span class="st-icon">${st.icon}</span>
                                        <div class="st-content">
                                            <div class="st-name">${st.name}</div>
                                            <div class="st-desc">${st.desc}</div>
                                        </div>
                                        <span class="st-status ${st.status}">${st.status}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                    ${compCount === 0 ? '<div style="font-size:0.75rem;color:#666;padding:8px;">Sin componentes</div>' : ''}
                </div>
            </div>
        `;
    }).join('');
}

function toggleSection(srvId) {
    const body = document.getElementById('section-body-' + srvId);
    if (body) body.classList.toggle('visible');
}

function toggleSubtasks(compId) {
    const card = document.getElementById('comp-' + compId);
    const container = document.getElementById('subtasks-' + compId);
    if (!card || !container) return;
    card.classList.toggle('expanded');
    container.classList.toggle('visible');
}

function highlightServer(srvId) {
    document.querySelectorAll('.server-section-header').forEach(el => el.style.background = '');
    const section = document.getElementById('section-' + srvId);
    if (section) {
        section.querySelector('.server-section-header').style.background = 'rgba(212,175,55,0.1)';
        document.getElementById('section-body-' + srvId).classList.add('visible');
    }
}

window.toggleSection = toggleSection;
window.toggleSubtasks = toggleSubtasks;
window.highlightServer = highlightServer;

renderPanel();

setInterval(() => {
    document.querySelector('.last-update').textContent = 'Actualizando...';
    setTimeout(() => location.reload(), 2000);
}, 60000);
</script>
</body>
</html>
