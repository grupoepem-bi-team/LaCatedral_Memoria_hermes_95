<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Catedral — Red Neural de Memoria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=MedievalSharp&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4af37; --oro-br: #ffd700; --oro-ten: #8a6d1f;
            --pergamino: #f3e5ab; --piedra: #1a1a22;
            --vidrio-rojo: rgba(139,0,0,0.2); --vidrio-azul: rgba(26,26,110,0.2);
            --vidrio-verde: rgba(13,77,13,0.2);
        }
        body { 
            background: radial-gradient(circle at top, #1a1a2e 0%, #0a0a0f 80%);
            color: var(--pergamino); font-family: 'Inter', sans-serif;
            margin:0; padding:0; width:100vw; height:100vh; overflow:hidden;
        }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-medieval { font-family: 'MedievalSharp', cursive; }
        #grafo { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:1; }
        .glass { 
            background: rgba(10, 10, 15, 0.75); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(212,175,55,0.2); 
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8);
        }
        .tooltip {
            position:fixed; padding:16px; background:rgba(10,10,15,0.95);
            border:1px solid var(--oro); border-radius:8px; font-size:0.8rem;
            color:var(--pergamino); max-width:340px; z-index:100;
            pointer-events:none; opacity:0; transition:opacity 0.2s;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(212,175,55,0.1);
        }
        .node-label {
            font-size:10px; fill:var(--pergamino); pointer-events:none; 
            text-anchor:middle; text-shadow: 0 2px 4px black;
        }
        .srv-label {
            font-size:13px; fill:var(--oro-br); pointer-events:none; 
            text-anchor:middle; font-weight:bold; text-shadow: 0 2px 6px black;
            font-family: 'Cinzel', serif;
        }
        .legend-dot { width:10px; height:10px; border-radius:50%; }
        #cathedral-bg { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; }
    </style>
</head>
<body>
    <svg id="cathedral-bg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
        <defs>
            <linearGradient id="gradPiedra" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#3a3a48"/><stop offset="100%" stop-color="#1a1a22"/>
            </linearGradient>
            <linearGradient id="gradOro" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ffd700"/><stop offset="100%" stop-color="#b8860b"/>
            </linearGradient>
            <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <!-- Suelo 3D -->
        <polygon points="0,720 1280,720 800,520 480,520" fill="url(#gradPiedra)" opacity="0.5"/>
        <path d="M 480 520 L 0 720 M 480 520 L 1280 720 M 0 620 L 1280 620" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
        <!-- Pilares Sólidos -->
        <g id="pilars">
            <rect x="50" y="0" width="80" height="720" fill="url(#gradPiedra)" />
            <rect x="40" y="0" width="100" height="40" fill="#3a3a48" rx="4"/>
            <rect x="40" y="680" width="100" height="40" fill="#3a3a48" rx="4"/>
            <rect x="1150" y="0" width="80" height="720" fill="url(#gradPiedra)" />
            <rect x="1140" y="0" width="100" height="40" fill="#3a3a48" rx="4"/>
            <rect x="1140" y="680" width="100" height="40" fill="#3a3a48" rx="4"/>
        </g>
        <!-- Boveda de Cruceria (Telarana) -->
        <g stroke="rgba(212,175,55,0.1)" stroke-width="2" fill="none">
            <path d="M 130 0 Q 640 400 1150 0" />
            <path d="M 0 360 Q 640 100 1280 360" />
            <path d="M 130 0 L 1150 720 M 1150 0 L 130 720" />
        </g>
        <!-- Roseton -->
        <circle cx="640" cy="80" r="60" fill="none" stroke="var(--oro)" stroke-width="2" opacity="0.3"/>
        <circle cx="640" cy="80" r="40" fill="none" stroke="var(--oro)" stroke-width="1" opacity="0.2"/>
    </svg>
    <svg id="grafo"></svg>
    <div class="topbar">
        <h1 class="font-cinzel">La Catedral</h1>
        <span class="sub font-medieval">Santuario de Datos</span>
        <div class="search">
            <input type="text" id="searchInput" placeholder="Buscar en el archivo..." />
        </div>
        <button class="btn" id="togglePanel">Panel</button>
    </div>
    <div class="panel hidden" id="panel">
        <div class="panel-section">
            <h3 class="font-cinzel">Santuario</h3>
            <div class="stat-grid">
                <div class="stat-card"><div class="val">{s.get("total_entries",0)}</div><div class="lbl">Memorias</div></div>
                <div class="stat-card"><div class="val">{s.get("total_mistakes",0)}</div><div class="lbl">Errores</div></div>
                <div class="stat-card"><div class="val">{s.get("total_outcomes",0)}</div><div class="lbl">Outcomes</div></div>
            </div>
        </div>
        <div class="panel-section">
            <h3 class="font-cinzel">Naves (Servidores)</h3>
            {srv_rows}
        </div>
        <div class="panel-section">
            <h3 class="font-cinzel">Reliquias Top</h3>
            {top_entries}
        </div>
        <div class="panel-section">
            <h3 class="font-cinzel">Runas (Tags)</h3>
            <div class="tag-cloud">{tag_pills}</div>
        </div>
    </div>
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#d4af37"></div>Memoria</div>
        <div class="legend-item"><div class="legend-dot" style="background:#c62828"></div>Error</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2e7d32"></div>Outcome</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fff;border:1px solid var(--oro)"></div>Servidor</div>
    </div>
    <div class="tooltip" id="tooltip"></div>
    <script>
        const DATA = ' + json_str + ';
        const width = window.innerWidth;
        const height = window.innerHeight;
        const svg = d3.select("#grafo").attr("viewBox", [0, 0, width, height]);
        const g = svg.append('g');
        const zoom = d3.zoom().scaleExtent([0.3, 3]).on('zoom', (e) => g.attr('transform', e.transform));
        svg.call(zoom);

        const srvColors = { 'prod-250': '#d4af37', 'espejo-241': '#7b1fa2', 'staging-240': '#1565c0', 'staging-99': '#00838f', 'backup-50': '#c62828', 'rdp-43': '#ef6c00', 'general': '#888' };
        const srvLabels = { 'prod-250': 'PROD .250', 'espejo-241': 'ESPEJO .241', 'staging-99': 'STAGING .99', 'general': 'GENERAL' };

        const srvCounts = {};
        DATA.entries.forEach(e => { srvCounts[e.parent] = (srvCounts[e.parent] || 0) + 1; });
        const srvPositions = { 'prod-250': {x: width * 0.2, y: height * 0.3}, 'espejo-241': {x: width * 0.8, y: height * 0.3}, 'staging-99': {x: width * 0.25, y: height * 0.65}, 'general': {x: width * 0.75, y: height * 0.6} };

        const serverNodes = Object.keys(srvCounts).map(srv => ({
            id: 'S_' + srv, type: 'server', server: srv, label: srvLabels[srv] || srv,
            count: srvCounts[srv], r: 30 + srvCounts[srv] * 4, color: srvColors[srv] || '#666',
            x: srvPositions[srv]?.x || width/2, y: srvPositions[srv]?.y || height/2
        }));

        const memNodes = DATA.entries.map(e => ({
            id: e.id, type: 'memoria', server: e.parent, subtema: e.subtema, title: e.title, content: e.content,
            vip: e.vip_score, r: Math.max(5, Math.sqrt(e.vip_score || 1) * 2.2), color: srvLores = srvColors[e.parent] || '#d4af37'
        }));

        const srvMemories = {};
        memNodes.forEach(m => {
            if (!srvMemories[m.server]) srvMemories[m.server] = [];
            srvMemories[m.server].push(m);
        });

        Object.keys(srvMemories).forEach(srv => {
            const center = srvPositions[srv] || {x: width/2, y: height/2};
            const items = srvMemories[srv];
            const radius = 140 + items.length * 10;
            items.forEach((m, i) => {
                const angle = (2 * Math.PI / items.length) * i - Math.PI / 2;
                m.x = center.x + Math.cos(angle) * radius;
                m.y = center.y + Math.sin(angle) * radius * 0.7;
            });
        });

        const allNodes = [...serverNodes, ...memNodes, ...DATA.mistakes.map((m,i)=>({id:'M'+m.id, type:'mistake', title:m.description, r:8, color:'#c62828', x:width*0.1, y:height*0.2+i*30})), ...DATA.outcomes.map((o,i)=>({id:'O'+o.id, type:'outcome', title:o.action_summary, r:8, color:'#2e7d32', x:width*0.9, y:height*0.8+i*30}))];

        const links = [];
        memNodes.forEach(m => links.push({source: m.id, target: 'S_' + m.server, type: 'parent'}));
        DATA.mistakes.forEach(m => { if(m.entry_id) links.push({source: 'M'+m.id, target: m.entry_id, type: 'mistake'})});
        DATA.outcomes.forEach(o => { if(o.entry_id) links.push({source: 'O'+o.id, target: o.entry_id, type: 'outcome'})});

        const link = g.append('g').selectAll('line').data(links).join('line')
            .attr('x1', d => allNodes.find(n => n.id === d.source)?.x || 0)
            .attr('y1', d => allNodes.find(n => n.id === d.source)?.y || 0)
            .attr('x2', d => allNodes.find(n => n.id === d.target)?.x || 0)
            .attr('y2', d => allNodes.find(n => n.id === d.target)?.y || 0)
            .attr('stroke', d => d.type === 'parent' ? 'rgba(212,175,55,0.15)' : d.type === 'mistake' ? 'rgba(198,40,40,0.3)' : 'rgba(46,125,50,0.3)')
            .attr('stroke-width', d => d.type === 'parent' ? 1.5 : 2)
            .attr('stroke-opacity', 0.5);

        const node = g.append('g').selectAll('g').data(allNodes).join('g')
            .attr('transform', d => `translate(${d.x},${d.y})`)
            .style('cursor', 'pointer')
            .call(d3.drag().on('start', (e,d) => d3.select(e.sourceEvent.target.parentNode).raise())
                            .on('drag', (e,d) => {
                                d.x = e.x; d.y = e.y;
                                d3.select(e.sourceEvent.target.parentNode).attr('transform', `translate(${d.x},${d.y})`);
                                link.attr('x1', l => allNodes.find(n => n.id === l.source)?.x || l.source.x)
                                    .attr('y1', l => allNodes.find(n => n.id === l.source)?.y || l.source.y)
                                    .attr('x2', l => allNodes.find(n => n.id === l.target)?.x || l.target.x)
                                    .attr('y2', l => allNodes.find(n => n.id === l.target)?.y || l.target.y);
                            }));

        node.append('circle').attr('r', d => d.r).attr('fill', d => d.type === 'server' ? 'rgba(0,0,0,0.4)' : d.color)
            .attr('stroke', d => d.color).attr('stroke-width', d => d.type === 'server' ? 3 : 1.5);

        node.filter(d => d.type === 'server').append('text').attr('class', 'srv-label').attr('dy', d => d.r + 20).text(d => d.label);
        node.filter(d => d.type === 'memoria').append('text').attr('class', 'node-label').attr('dy', d => -d.r - 8).text(d => d.title.slice(0, 30));

        node.on('mouseover', function(event, d) {
            d3.select(this).select('circle').attr('stroke-width', 4);
            link.attr('stroke-opacity', l => (l.source.id === d.id || l.target.id === d.id) ? 0.9 : 0.02);
            tooltip.style('opacity', 1).html(() => {
                if (d.type === 'server') return `<h4 class="font-cinzel">${d.label}</h4><div class="meta">${d.count} memorias en la nave</div>`;
                return `<h4 class="font-cinzel">${d.title}</h4><div class="meta">${d.server}/${d.subtema} · VIP ${d.vip}</div><div class="body">${d.content}</div>`;
            })
            .style('left', Math.min(event.pageX + 14, window.innerWidth - 360) + 'px')
            .style('top', Math.min(event.pageY + 14, window.innerHeight - 120) + 'px');
        })
        .on('mouseout', function() {
            d3.select(this).select('circle').attr('stroke-width', d => d.type === 'server' ? 3 : 1.5);
            link.attr('stroke-opacity', 0.5);
            tooltip.style('opacity', 0);
        })
        .on('click', function(event, d) {
            const scale = d.type === 'server' ? 1.2 : 2.0;
            svg.transition().duration(700).call(zoom.transform, d3.zoomIdentity.translate(width/2 - d.x*scale, height/2 - d.y*scale).scale(scale));
        });

        document.getElementById('searchInput').addEventListener('input', function() {
            const q = this.value.toLowerCase();
            node.select('circle').attr('fill-opacity', d => {
                if (d.type === 'server') {
                    const match = memNodes.some(m => m.server === d.server && ((m.title||'').toLowerCase().includes(q) || (m.tags||'').toLowerCase().includes(q)));
                    return match ? 0.4 : 0.05;
                }
                return ((d.title||'').toLowerCase().includes(q) || (d.tags||'').toLowerCase().includes(q)) ? 0.95 : 0.06;
            });
        });

        document.getElementById('togglePanel').addEventListener('click', () => {
            document.getElementById('panel').classList.toggle('hidden');
        });

        window.focusNode = function(id) {
            const n = allNodes.find(x => x.id === id);
            if (!n) return;
            svg.transition().duration(700).call(zoom.transform, d3.zoomIdentity.translate(width/2 - n.x*2, height/2 - n.y*2).scale(2));
        };
    </script></body></html>
