const width = document.getElementById('main').clientWidth;
const height = document.getElementById('main').clientHeight;

const svg = d3.select("#grafo").attr("width", width).attr("height", height);
const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.25, 4]).on('zoom', (e) => g.attr('transform', e.transform));
svg.call(zoom);

const tooltip = d3.select("#tooltip");
let selectedCompId = null;
let selectedServerId = null;

// === POSICIONES SERVIDORES ===
const servers = DATA.servers.map((d, i) => {
    const isCenter = d.id === 'srv-95';
    const angle = isCenter ? 0 : (2 * Math.PI / (DATA.servers.length - 1)) * (i - 1) - Math.PI / 2;
    const dist = isCenter ? 0 : Math.min(width, height) * 0.38;
    d.x = width / 2 + Math.cos(angle) * dist;
    d.y = height / 2 + Math.sin(angle) * dist * 0.8;
    d.isCenter = isCenter;
    return d;
});

// === POSICIONES COMPONENTES ===
const components = DATA.components.map((c, i) => {
    const srv = servers.find(s => s.id === c.server);
    if (srv) {
        const srvComps = DATA.components.filter(x => x.server === c.server);
        const count = srvComps.length;
        const idx = srvComps.indexOf(c);
        const angle = (2 * Math.PI / count) * idx + (srv.isCenter ? 0 : Math.PI / 3);
        const dist = srv.isCenter ? 180 : 130;
        c.x = srv.x + Math.cos(angle) * dist;
        c.y = srv.y + Math.sin(angle) * dist;
        c.parentServer = srv;
    }
    return c;
});

// === CANALES ===
const flows = DATA.flows.map(f => {
    const from = servers.find(s => s.id === f.from);
    const to = servers.find(s => s.id === f.to);
    if (from && to) {
        f.x1 = from.x; f.y1 = from.y;
        f.x2 = to.x; f.y2 = to.y;
        f.midX = (from.x + to.x) / 2;
        f.midY = (from.y + to.y) / 2 - 40;
    }
    return f;
});

// === MAPA DE CONEXIONES PARA CADA NODO ===
function getConnectedNodes(nodeId) {
    const connected = new Set([nodeId]);
    // Si es servidor, encontrar componentes que orbitan
    const isServer = servers.some(s => s.id === nodeId);
    if (isServer) {
        components.filter(c => c.server === nodeId).forEach(c => connected.add(c.id));
        // Flujos donde participa este servidor
        flows.filter(f => f.from === nodeId || f.to === nodeId).forEach(f => {
            connected.add(f.from);
            connected.add(f.to);
        });
    } else {
        // Es componente, conectar con su servidor padre
        const comp = components.find(c => c.id === nodeId);
        if (comp) {
            connected.add(comp.server);
            // Tambien componentes del mismo servidor
            components.filter(c => c.server === comp.server).forEach(c => connected.add(c.id));
        }
    }
    return connected;
}

function getConnectedFlows(nodeId) {
    const isServer = servers.some(s => s.id === nodeId);
    if (isServer) {
        return flows.filter(f => f.from === nodeId || f.to === nodeId).map(f => f.id);
    }
    // Componente: flujos del servidor padre
    const comp = components.find(c => c.id === nodeId);
    if (comp) {
        return flows.filter(f => f.from === comp.server || f.to === comp.server).map(f => f.id);
    }
    return [];
}

// === RENDER CANALES (guardar referencias) ===
const channelPath = d3.line().curve(d3.curveBasis);
const flowElements = {};

flows.forEach((f, i) => {
    if (!f.x1) return;
    const pathData = [[f.x1, f.y1], [f.midX, f.midY], [f.x2, f.y2]];
    
    const path = g.append('path')
        .attr('d', channelPath(pathData))
        .attr('stroke', 'rgba(212,175,55,0.1)')
        .attr('stroke-width', 2)
        .attr('fill', 'none')
        .attr('class', `flow-${f.id}`);
    
    const particle = g.append('circle')
        .attr('r', 3)
        .attr('fill', f.type === 'replica' ? '#4caf50' : f.type === 'telegram' ? '#d4af37' : '#2196f3')
        .attr('class', `flow-particle-${f.id}`);
    
    let progress = i * 0.3;
    function animate() {
        progress += 0.006;
        if (progress > 1) progress = 0;
        const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pathEl.setAttribute('d', channelPath(pathData));
        const len = pathEl.getTotalLength();
        const point = pathEl.getPointAtLength(progress * len);
        particle.attr('cx', point.x).attr('cy', point.y)
            .attr('opacity', 0.3 + Math.sin(progress * Math.PI * 2) * 0.7);
        requestAnimationFrame(animate);
    }
    animate();
    
    const label = g.append('text')
        .attr('x', f.midX).attr('y', f.midY - 10)
        .attr('class', `channel-label flow-label-${f.id}`)
        .text(f.icon + ' ' + f.name);
    
    flowElements[f.id] = { path, particle, label };
});

// === CONEXIONES SERVIDOR -> COMPONENTE (guardar referencias) ===
const linkElements = [];

components.forEach(c => {
    if (!c.parentServer) return;
    const line = g.append('line')
        .attr('x1', c.parentServer.x).attr('y1', c.parentServer.y)
        .attr('x2', c.x).attr('y2', c.y)
        .attr('stroke', 'rgba(212,175,55,0.06)')
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '4,4')
        .attr('class', `link-${c.id} link-srv-${c.server}`);
    linkElements.push({ line, compId: c.id, srvId: c.server });
});

// === RENDER COMPONENTES ===
const compGroup = g.selectAll('.comp-node').data(components).join('g')
    .attr('class', d => `comp-node comp-node-${d.id}`)
    .attr('transform', d => `translate(${d.x},${d.y})`)

    .style('opacity', 0);

compGroup.append('circle')
    .attr('r', 28)
    .attr('fill', 'rgba(30,30,40,0.95)')
    .attr('stroke', d => d.parentServer ? d.parentServer.color : '#666')
    .attr('stroke-width', 2)
    .attr('stroke-opacity', 0.5);

compGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', 6)
    .attr('font-size', '18px')
    .text(d => d.icon);

compGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', -38)
    .attr('fill', '#aaa').attr('font-size', '9px')
    .text(d => d.name.length > 14 ? d.name.slice(0,14)+'...' : d.name);

compGroup.transition().duration(800).delay((d, i) => i * 100).style('opacity', 1);

// === RENDER SERVIDORES ===
const serverGroup = g.selectAll('.server-node').data(servers).join('g')
    .attr('class', d => `server-node server-node-${d.id}`)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer')
    .style('opacity', 0);

serverGroup.append('circle')
    .attr('r', d => d.isCenter ? 75 : 55)
    .attr('fill', d => d.status === 'online' ? 'rgba(76,175,80,0.06)' : 'rgba(244,67,54,0.06)')
    .attr('stroke', d => d.color)

    .attr('stroke-opacity', 0.6)
    .attr('stroke-dasharray', d => d.status === 'online' ? 'none' : '8,4');

serverGroup.append('circle')
    .attr('r', d => d.isCenter ? 60 : 45)
    .attr('fill', 'rgba(10,10,15,0.9)')
    .attr('stroke', d => d.color)
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.3);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? -14 : -10)
    .attr('font-size', d => d.isCenter ? '2.2rem' : '1.7rem')
    .text(d => d.icon);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? 20 : 16)
    .attr('fill', '#fff').attr('font-size', d => d.isCenter ? '14px' : '12px')
    .attr('font-weight', 'bold').attr('letter-spacing', '1px')
    .text(d => d.name);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? 38 : 30)
    .attr('fill', d => d.status === 'online' ? '#4caf50' : '#f44336')
    .attr('font-size', '10px')
    .text(d => d.status);

serverGroup.transition().duration(800).delay((d, i) => i * 150).style('opacity', 1);

// === FUNCIONES DE HIGHLIGHT ===
function highlightNode(nodeId) {
    const connected = getConnectedNodes(nodeId);
    const connectedFlows = getConnectedFlows(nodeId);
    
    // Atencuar todo
    d3.selectAll('.server-node, .comp-node').transition().duration(400)
        .style('opacity', d => connected.has(d.id) ? 1 : 0.15);
    
    // Resaltar conexiones servidor-componente
    linkElements.forEach(({line, compId, srvId}) => {
        const isConnected = connected.has(compId) || connected.has(srvId);
        line.transition().duration(400)
            .attr('stroke-opacity', isConnected ? 0.6 : 0.05)
            .attr('stroke-width', isConnected ? 2 : 1);
    });
    
    // Resaltar flujos
    Object.keys(flowElements).forEach(fid => {
        const isConnected = connectedFlows.includes(fid);
        const el = flowElements[fid];
        el.path.transition().duration(400)
            .attr('stroke-opacity', isConnected ? 0.8 : 0.05)
            .attr('stroke-width', isConnected ? 3 : 1);
        el.label.transition().duration(400)
            .style('opacity', isConnected ? 1 : 0.1);
        el.particle.transition().duration(400)
            .style('opacity', isConnected ? 1 : 0.1);
    });
}

function resetHighlight() {
    d3.selectAll('.server-node, .comp-node').transition().duration(500)
        .style('opacity', 1);
    
    linkElements.forEach(({line}) => {
        line.transition().duration(500)
            .attr('stroke-opacity', 0.06)
            .attr('stroke-width', 1);
    });
    
    Object.keys(flowElements).forEach(fid => {
        const el = flowElements[fid];
        el.path.transition().duration(500)
            .attr('stroke-opacity', 0.1)
            .attr('stroke-width', 2);
        el.label.transition().duration(500)
            .style('opacity', 1);
    });
}

function zoomToNode(node, scale) {
    svg.transition().duration(800).ease(d3.easeCubicInOut).call(zoom.transform,
        d3.zoomIdentity.translate(width/2 - node.x*scale, height/2 - node.y*scale).scale(scale));
}

function zoomToFit() {
    const allNodes = [...servers, ...components];
    const minX = Math.min(...allNodes.map(n => n.x)) - 100;
    const maxX = Math.max(...allNodes.map(n => n.x)) + 100;
    const minY = Math.min(...allNodes.map(n => n.y)) - 100;
    const maxY = Math.max(...allNodes.map(n => n.y)) + 100;
    
    const dx = maxX - minX;
    const dy = maxY - minY;
    const scale = Math.min(width / dx, height / dy, 1) * 0.9;
    const tx = (width - dx * scale) / 2 - minX * scale;
    const ty = (height - dy * scale) / 2 - minY * scale;
    
    svg.transition().duration(1000).ease(d3.easeCubicInOut).call(zoom.transform,
        d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function showComponentDetail(comp) {
    selectedCompId = comp.id;
    const panel = document.getElementById('detail-panel');
    const content = document.getElementById('detail-content');
    
    const subtasksHtml = comp.subtasks.map(st => {
        const color = st.status === 'done' ? '#4caf50' : st.status === 'active' ? '#2196f3' : '#ff9800';
        return `

                </div>
                <span class="dst-status" style="background: ${color}20; color: ${color};">${st.status}</span>
            </div>
        `;
    }).join('');
    
    content.innerHTML = `
        <div class="detail-header">
            <span class="detail-icon">${comp.icon}</span>
            <span class="detail-title">${comp.name}</span>
        </div>
        <div class="detail-desc">${comp.human_desc}</div>
        <div class="detail-meta">
            <div>🖥️ Servidor: ${comp.parentServer.name}</div>
            <div>⏱️ Schedule: ${comp.schedule}</div>
            <div>🕐 Ultima: ${comp.last_run}</div>
            <div>📋 Subtareas: ${comp.subtasks.length}</div>
        </div>
        <div class="detail-subtasks-title">Subtareas (${comp.subtasks.length})</div>
        ${subtasksHtml}
    `;
    
    panel.classList.add('visible');
}

function closeDetailPanel() {
    document.getElementById('detail-panel').classList.remove('visible');
}

window.closeDetailPanel = closeDetailPanel;

// === PANEL LATERAL ===
function renderPanel() {
    const container = document.getElementById('server-sections');
    container.innerHTML = DATA.servers.map(srv => {
        const srvComps = DATA.components.filter(c => c.server === srv.id);
        const compCount = srvComps.length;
        const subtaskCount = srvComps.reduce((sum, c) => sum + (c.subtasks ? c.subtasks.length : 0), 0);
        
        return `
            <div class="server-section" id="section-${srv.id}">
                <div class="server-section-header" onclick="toggleSection('${srv.id}')">
                    <span class="sh-icon">${srv.icon}</span>
                    <span class="sh-name">${srv.name}</span>
                    <span class="sh-count">${compCount} comp · ${subtaskCount} subs</span>
                    <span class="sh-status ${srv.status}">${srv.status}</span>
                </div>
                <div class="server-section-body ${srv.id === 'srv-95' ? 'visible' : ''}" id="section-body-${srv.id}">
                    <div style="font-size:0.78rem;color:#999;margin:10px 0;line-height:1.4;">${srv.desc}</div>
                    ${srvComps.map(c => `
                        <div class="comp-card ${selectedCompId === c.id ? 'active' : ''}" id="comp-${c.id}" onclick="event.stopPropagation(); selectComponent('${c.id}')">
                            <div class="comp-header">
                                <span class="comp-icon">${c.icon}</span>
                                <span class="comp-name">${c.name}</span>
                                <span class="expand-icon">▶</span>
                            </div>
                            <div class="comp-desc">${c.human_desc}</div>
                            <div class="comp-meta">
                                <span>⏱ ${c.schedule}</span>
                                <span>🕐 ${c.last_run}</span>
                                <span>📋 ${c.subtasks.length} subtareas</span>
                            </div>
                        </div>
                    `).join('')}
                    ${compCount === 0 ? '<div style="font-size:0.78rem;color:#666;padding:10px;">Sin componentes activos</div>' : ''}
                </div>
            </div>
        `;
    }).join('');
}

function toggleSection(srvId) {
    const body = document.getElementById('section-body-' + srvId);
    if (body) body.classList.toggle('visible');
}

function selectComponent(compId) {
    const comp = DATA.components.find(c => c.id === compId);
    if (comp) {
        selectedCompId = compId;
        selectedServerId = null;
        showComponentDetail(comp);
        highlightNode(compId);
        zoomToNode(comp, 2.5);
        renderPanel();
    }
}

function highlightServer(srvId) {
    document.querySelectorAll('.server-section').forEach(el => el.style.borderColor = '');
    const section = document.getElementById('section-' + srvId);
    if (section) {
        section.style.borderColor = 'rgba(212,175,55,0.3)';
        document.getElementById('section-body-' + srvId).classList.add('visible');
    }
}

window.toggleSection = toggleSection;
window.selectComponent = selectComponent;
window.highlightServer = highlightServer;
window.closeDetailPanel = closeDetailPanel;

renderPanel();

// Zoom inicial a vista general
setTimeout(() => zoomToFit(), 500);

setInterval(() => {
    document.querySelector('.last-update').textContent = 'Actualizando...';
    setTimeout(() => location.reload(), 2000);
}, 60000);
</script>
</body>
</html>
