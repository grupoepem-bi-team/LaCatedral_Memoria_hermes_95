function calcComponentPositions(srvPositions) {

// ─── VERIFICACIÓN Y AJUSTE DE COLISIONES ───
function resolveCollisions(srvPos, compPos) {
    const allNodes = [];
    DATA.servers.forEach(s => {
        const p = srvPos[s.id];
        allNodes.push({ id: s.id, x: p.x, y: p.y, r: SRV_R_OUTER, type: 'srv' });
    });
    DATA.components.forEach(c => {
        const p = compPos[c.id];
        if (p) allNodes.push({ id: c.id, x: p.x, y: p.y, r: COMP_R, type: 'comp', server: c.server });
    });
    
    // Iterar hasta que no haya colisiones
    let iterations = 0;
    let maxIter = 100;
    while (iterations < maxIter) {
        let moved = false;
        for (let i = 0; i < allNodes.length; i++) {
            for (let j = i + 1; j < allNodes.length; j++) {
                const a = allNodes[i];
                const b = allNodes[j];
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const minDist = a.r + b.r + PAD;
                
                if (dist < minDist && dist > 0) {
                    // Empujar ambos nodos en dirección opuesta
                    const overlap = minDist - dist;
                    const nx = dx / dist;
                    const ny = dy / dist;
                    const push = overlap / 2 + 1;
                    
                    // No mover servidores (son ancla), solo componentes
                    if (a.type === 'comp' && b.type === 'comp') {
                        a.x -= nx * push;
                        a.y -= ny * push;
                        b.x += nx * push;
                        b.y += ny * push;
                    } else if (a.type === 'comp' && b.type === 'srv') {
                        // Empujar componente lejos del servidor
                        a.x -= nx * push * 1.5;
                        a.y -= ny * push * 1.5;
                    } else if (a.type === 'srv' && b.type === 'comp') {
                        b.x += nx * push * 1.5;
                        b.y += ny * push * 1.5;
                    }
                    moved = true;
                }
            }
        }
        if (!moved) break;
        iterations++;
    }
    
    // Aplicar posiciones corregidas
    allNodes.forEach(n => {
        if (n.type === 'srv') {
            srvPos[n.id] = { x: n.x, y: n.y };
        } else {
            compPos[n.id] = { x: n.x, y: n.y };
        }
    });
}

        pathEl.setAttribute('d', channelPath(pathData));
        const len = pathEl.getTotalLength();
        const point = pathEl.getPointAtLength(progress * len);
        particle.attr('cx', point.x).attr('cy', point.y)
            .attr('opacity', 0.3 + Math.sin(progress * Math.PI * 2) * 0.7);
        requestAnimationFrame(animate);
    }
    animate();
    const label = g.append('text')
        .attr('x', f.midX).attr('y', f.midY - 10)
        .attr('class', `channel-label flow-label-${f.id}`)
        .text(f.icon + ' ' + f.name);
    flowElements[f.id] = { path, particle, label };
});

// ─── CONEXIONES SERVIDOR-COMPONENTE ───
const linkElements = [];
components.forEach(c => {
    if (!c.parentServer) return;
    const line = g.append('line')
        .attr('x1', c.parentServer.x).attr('y1', c.parentServer.y)
        .attr('x2', c.x).attr('y2', c.y)
        .attr('stroke', 'rgba(212,175,55,0.06)')
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '4,4')
        .attr('class', `link-${c.id} link-srv-${c.server}`);
    linkElements.push({ line, compId: c.id, srvId: c.server });
});

// ─── RENDER COMPONENTES ───
const compGroup = g.selectAll('.comp-node').data(components).join('g')
    .attr('class', d => `comp-node comp-node-${d.id}`)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer')
    .style('opacity', 0);

const compRadius = isMobile() ? 24 : COMP_R;
compGroup.append('circle')
    .attr('r', compRadius)
    .attr('fill', 'rgba(30,30,40,0.95)')
    .attr('stroke', d => d.parentServer ? d.parentServer.color : '#666')
    .attr('stroke-width', 2)
    .attr('stroke-opacity', 0.5);

compGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', isMobile() ? 5 : 6)
    .attr('font-size', isMobile() ? '14px' : '18px')
    .text(d => d.icon);

compGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', isMobile() ? -34 : -42)
    .attr('fill', '#aaa').attr('font-size', '9px')
    .text(d => d.name.length > (isMobile() ? 10 : 12) ? d.name.slice(0, isMobile() ? 10 : 12)+'…' : d.name);

compGroup.transition().duration(800).delay((d, i) => i * 100).style('opacity', 1);

// ─── RENDER SERVIDORES ───
const serverGroup = g.selectAll('.server-node').data(servers).join('g')
    .attr('class', d => `server-node server-node-${d.id}`)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer')
    .style('opacity', 0);

const srvOuterR = isMobile() ? 50 : SRV_R_OUTER;
const srvInnerR = isMobile() ? 40 : SRV_R_INNER;

serverGroup.append('circle')
    .attr('r', srvOuterR)
    .attr('fill', d => d.status === 'online' ? 'rgba(76,175,80,0.06)' : 'rgba(244,67,54,0.06)')
    .attr('stroke', d => d.color)
    .attr('stroke-width', d => d.isCenter ? 3 : 2.5)
    .attr('stroke-opacity', 0.6)
    .attr('stroke-dasharray', d => d.status === 'online' ? 'none' : '8,4');

serverGroup.append('circle')
    .attr('r', srvInnerR)
    .attr('fill', 'rgba(10,10,15,0.9)')
    .attr('stroke', d => d.color)
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.3);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? (isMobile() ? -10 : -14) : (isMobile() ? -8 : -10))
    .attr('font-size', d => d.isCenter ? (isMobile() ? '1.6rem' : '2.2rem') : (isMobile() ? '1.3rem' : '1.7rem'))
    .text(d => d.icon);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? (isMobile() ? 16 : 20) : (isMobile() ? 12 : 16))
    .attr('fill', '#fff').attr('font-size', d => d.isCenter ? (isMobile() ? '11px' : '14px') : (isMobile() ? '9px' : '12px'))
    .attr('font-weight', 'bold').attr('letter-spacing', '1px')
    .text(d => d.name);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? (isMobile() ? 28 : 36) : (isMobile() ? 24 : 30))
    .attr('fill', d => d.status === 'online' ? '#4caf50' : '#f44336')
    .attr('font-size', '9px')
    .text(d => d.status);

serverGroup.transition().duration(800).delay((d, i) => i * 150).style('opacity', 1);

// ─── HIGHLIGHT ───
function highlightNode(nodeId) {
    const connected = getConnectedNodes(nodeId);
    const connectedFlows = getConnectedFlows(nodeId);
    d3.selectAll('.server-node, .comp-node').transition().duration(400)
        .style('opacity', d => connected.has(d.id) ? 1 : 0.15);
    linkElements.forEach(({line, compId, srvId}) => {
        const isConnected = connected.has(compId) || connected.has(srvId);
        line.transition().duration(400)
            .attr('stroke-opacity', isConnected ? 0.6 : 0.05)
            .attr('stroke-width', isConnected ? 2 : 1);
    });
    Object.keys(flowElements).forEach(fid => {
        const isConnected = connectedFlows.includes(fid);
        const el = flowElements[fid];
        el.path.transition().duration(400)
            .attr('stroke-opacity', isConnected ? 0.8 : 0.05)
            .attr('stroke-width', isConnected ? 3 : 1);
        el.label.transition().duration(400)
            .style('opacity', isConnected ? 1 : 0.1);
        el.particle.transition().duration(400)
            .style('opacity', isConnected ? 1 : 0.1);
    });
}

function resetHighlight() {
    d3.selectAll('.server-node, .comp-node').transition().duration(500)
        .style('opacity', 1);
    linkElements.forEach(({line}) => {
        line.transition().duration(500)
            .attr('stroke-opacity', 0.06)
            .attr('stroke-width', 1);
    });
    Object.keys(flowElements).forEach(fid => {
        const el = flowElements[fid];
        el.path.transition().duration(500)
            .attr('stroke-opacity', 0.1)
            .attr('stroke-width', 2);
        el.label.transition().duration(500)
            .style('opacity', 1);
    });
}

function zoomToNode(node, scale) {
    svg.transition().duration(800).ease(d3.easeCubicInOut).call(zoom.transform,
        d3.zoomIdentity.translate(W/2 - node.x*scale, H/2 - node.y*scale).scale(scale));
}

function zoomToFit() {
    const allNodes = [...servers, ...components];
    const minX = Math.min(...allNodes.map(n => n.x)) - 120;
    const maxX = Math.max(...allNodes.map(n => n.x)) + 120;
    const minY = Math.min(...allNodes.map(n => n.y)) - 120;
    const maxY = Math.max(...allNodes.map(n => n.y)) + 120;
    const dx = maxX - minX;
    const dy = maxY - minY;
    const scale = Math.min(W / dx, H / dy, 1) * 0.88;
    const tx = (W - dx * scale) / 2 - minX * scale;
    const ty = (H - dy * scale) / 2 - minY * scale;
    svg.transition().duration(1000).ease(d3.easeCubicInOut).call(zoom.transform,
        d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ─── INTERACCIONES ───
serverGroup.on('touchstart mouseover', function(event, d) {
    d3.select(this).select('circle').transition().duration(200)
        .attr('stroke-width', d.isCenter ? 5 : 4).attr('stroke-opacity', 1);
    tooltip.html(`<div class="tt-title">${d.icon} ${d.name}</div><div class="tt-desc">${d.desc}</div><div class="tt-meta">IP: ${d.ip} | Estado: ${d.status}</div>`)
        .classed('visible', true)
        .style('left', Math.min((event.pageX || event.touches[0].pageX) + 12, window.innerWidth - 300) + 'px')
        .style('top', Math.min((event.pageY || event.touches[0].pageY) + 12, window.innerHeight - 150) + 'px');
})
.on('mouseout', function(event, d) {
    if (!selectedServerId || selectedServerId !== d.id) {
        d3.select(this).select('circle').transition().duration(200)
            .attr('stroke-width', d.isCenter ? 3 : 2.5).attr('stroke-opacity', 0.6);
    }
    tooltip.classed('visible', false);
})
.on('click', function(event, d) {
    event.stopPropagation();
    selectedCompId = null; selectedServerId = d.id;
    closeDetailPanel();
    highlightNode(d.id);
    zoomToNode(d, d.isCenter ? (isMobile() ? 1.1 : 1.3) : (isMobile() ? 1.4 : 1.8));
    highlightServer(d.id);
});

compGroup.on('touchstart mouseover', function(event, d) {
    d3.select(this).select('circle').transition().duration(200)
        .attr('stroke-width', 3).attr('stroke-opacity', 0.9).attr('r', compRadius + 4);
    const subtasksPreview = d.subtasks.slice(0, 3).map(st =>
        `<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:0.72rem;color:#ccc;"><span>${st.icon}</span><span>${st.name}</span><span style="margin-left:auto;font-size:0.6rem;" class="st-${st.status}">${st.status}</span></div>`
    ).join('');
    const more = d.subtasks.length > 3 ? `<div style="font-size:0.68rem;color:#888;margin-top:4px;">+${d.subtasks.length - 3} más...</div>` : '';
    tooltip.html(`<div class="tt-title">${d.icon} ${d.name}</div><div class="tt-desc">${d.human_desc}</div><div style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(212,175,55,0.15);"><div style="font-size:0.68rem;color:var(--oro);margin-bottom:3px;">Subtareas (${d.progress}%):</div>${subtasksPreview}${more}</div>`)
        .classed('visible', true)
        .style('left', Math.min((event.pageX || event.touches[0].pageX) + 12, window.innerWidth - 300) + 'px')
        .style('top', Math.min((event.pageY || event.touches[0].pageY) + 12, window.innerHeight - 200) + 'px');
})
.on('mouseout', function(event, d) {
    if (!selectedCompId || selectedCompId !== d.id) {
        d3.select(this).select('circle').transition().duration(200)
            .attr('stroke-width', 2).attr('stroke-opacity', 0.5).attr('r', compRadius);
    }
    tooltip.classed('visible', false);
})
.on('click', function(event, d) {
    event.stopPropagation();
    selectedCompId = d.id; selectedServerId = null;
    showComponentDetail(d); highlightNode(d.id);
    zoomToNode(d, isMobile() ? 2 : 2.5);
});

svg.on('click', function(event) {
    if (event.target.tagName === 'svg') {
        selectedCompId = null; selectedServerId = null;
        closeDetailPanel(); resetHighlight(); zoomToFit();
    }
});

// ─── DRAWER ───
function toggleDrawer() {
    drawerOpen = !drawerOpen;
    const panel = document.getElementById('side-panel');
    const overlay = document.getElementById('side-panel-overlay');
    if (drawerOpen) { panel.classList.add('visible'); overlay.classList.add('visible'); }
    else { panel.classList.remove('visible'); overlay.classList.remove('visible'); }
}
window.toggleDrawer = toggleDrawer;

// ─── BUSCADOR ───
const searchBox = document.getElementById('search-box');
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

let searchIndex = [];
DATA.servers.forEach(s => searchIndex.push({ type: 'servidor', id: s.id, name: s.name, icon: s.icon, desc: s.desc }));
DATA.components.forEach(c => {
    searchIndex.push({ type: 'componente', id: c.id, name: c.name, icon: c.icon, desc: c.human_desc, server: c.server });
    c.subtasks.forEach((st, i) => searchIndex.push({ type: 'subtarea', id: c.id + '-sub-' + i, name: st.name, icon: st.icon, desc: st.human_summary, parent: c.name }));
});

function openSearch() { searchBox.classList.add('visible'); searchInput.focus(); searchInput.value = ''; searchResults.innerHTML = ''; }
function closeSearch() { searchBox.classList.remove('visible'); searchResults.innerHTML = ''; }
function doSearch(query) {
    if (!query || query.length < 2) { searchResults.innerHTML = ''; return; }
    const q = query.toLowerCase();
    const results = searchIndex.filter(item => item.name.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q)).slice(0, 10);
    searchResults.innerHTML = results.map(r => {
        const typeLabel = { 'servidor': 'Srv', 'componente': 'Comp', 'subtarea': 'Sub' }[r.type];
        return `<div class="search-result" onclick="goToSearchResult('${r.type}', '${r.id}')"><span class="sr-icon">${r.icon}</span><span>${r.name}</span>${r.parent ? `<span style="color:#888;font-size:0.65rem;">(${r.parent})</span>` : ''}<span class="sr-type">${typeLabel}</span></div>`;
    }).join('') || '<div style="padding:10px;color:#888;font-size:0.8rem;">Sin resultados</div>';
}
function goToSearchResult(type, id) {
    closeSearch();
    if (type === 'servidor') {
        const srv = servers.find(s => s.id === id);
        if (srv) { selectedServerId = id; selectedCompId = null; closeDetailPanel(); highlightNode(id); zoomToNode(srv, srv.isCenter ? 1.3 : 1.8); highlightServer(id); }
    } else if (type === 'componente') {
        const comp = components.find(c => c.id === id);
        if (comp) { selectedCompId = id; selectedServerId = null; showComponentDetail(comp); highlightNode(id); zoomToNode(comp, 2.5); }
    } else if (type === 'subtarea') {
        const compId = id.split('-sub-')[0];
        const comp = components.find(c => c.id === compId);
        if (comp) { selectedCompId = compId; selectedServerId = null; showComponentDetail(comp); highlightNode(compId); zoomToNode(comp, 2.5); }
    }
}
searchInput.addEventListener('input', (e) => doSearch(e.target.value));
searchInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSearch(); });
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
    if (e.key === 'Escape') { closeSearch(); selectedCompId = null; selectedServerId = null; closeDetailPanel(); resetHighlight(); zoomToFit(); }
});
window.openSearch = openSearch; window.closeSearch = closeSearch; window.goToSearchResult = goToSearchResult;

// ─── DETAIL PANEL ───
function showComponentDetail(comp) {
    selectedCompId = comp.id;
    const panel = document.getElementById('detail-panel');
    const content = document.getElementById('detail-content');
    const subtasksHtml = comp.subtasks.map(st => {
        const color = st.status === 'done' ? '#4caf50' : st.status === 'active' ? '#2196f3' : '#ff9800';
        return `<div class="detail-subtask ${st.status}"><span class="dst-icon">${st.icon}</span><div class="dst-content"><div class="dst-name">${st.name}</div><div class="dst-human">${st.human_summary}</div></div><span class="dst-status" style="background: ${color}20; color: ${color};">${st.status}</span></div>`;
    }).join('');
    content.innerHTML = `
        <div class="detail-header"><span class="detail-icon">${comp.icon}</span><span class="detail-title">${comp.name}</span></div>
        <div class="detail-desc">${comp.human_desc}</div>
        <div class="detail-meta"><div>🖥️ ${comp.parentServer.name}</div><div>⏱️ ${comp.schedule}</div><div>🕐 ${comp.last_run}</div><div>📊 ${comp.progress}%</div></div>
        <div class="detail-subtasks-title">Subtareas (${comp.subtasks.length})</div>
        ${subtasksHtml}`;
    panel.classList.add('visible');
    if (isMobile() && drawerOpen) toggleDrawer();
}
function closeDetailPanel() { document.getElementById('detail-panel').classList.remove('visible'); }
window.closeDetailPanel = closeDetailPanel;

// ─── EXPORT JSON ───
function exportJSON() {
    const exportData = { ...DATA, export_info: { exported_at: new Date().toISOString(), version: DATA.meta.version, stats: STATS } };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `la_catedral_estado_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
window.exportJSON = exportJSON;

// ─── PANEL LATERAL ───
function renderPanel() {
    const container = document.getElementById('server-sections');
    container.innerHTML = DATA.servers.map(srv => {
        const srvComps = DATA.components.filter(c => c.server === srv.id);
        const compCount = srvComps.length;
        const subtaskCount = srvComps.reduce((sum, c) => sum + (c.subtasks ? c.subtasks.length : 0), 0);
        return `
            <div class="server-section" id="section-${srv.id}">
                <div class="server-section-header" onclick="toggleSection('${srv.id}')">
                    <span class="sh-icon">${srv.icon}</span>
                    <span class="sh-name">${srv.name}</span>
                    <span class="sh-count">${compCount} · ${subtaskCount}</span>
                    <span class="sh-status ${srv.status}">${srv.status}</span>
                </div>
                <div class="server-section-body ${srv.id === 'srv-95' ? 'visible' : ''}" id="section-body-${srv.id}">
                    <div style="font-size:0.75rem;color:#999;margin:8px 0;line-height:1.3;">${srv.desc}</div>
                    ${srvComps.map(c => {
                        const done = c.subtasks.filter(s => s.status === 'done').length;
                        const progress = Math.round((done / c.subtasks.length) * 100);
                        const progColor = done === c.subtasks.length ? '#4caf50' : done > 0 ? '#d4af37' : '#888';
                        return `<div class="comp-card ${selectedCompId === c.id ? 'active' : ''}" id="comp-${c.id}" onclick="event.stopPropagation(); selectComponent('${c.id}')">
                            <div class="comp-header"><span class="comp-icon">${c.icon}</span><span class="comp-name">${c.name}</span></div>
                            <div class="comp-desc">${c.human_desc}</div>
                            <div class="comp-meta"><span>⏱ ${c.schedule}</span><span>📋 ${c.subtasks.length}</span></div>
                            <div class="comp-progress"><div class="progress-bar"><div class="progress-fill" style="width: ${progress}%; background: ${progColor};"></div></div></div>
                        </div>`;
                    }).join('')}
                    ${compCount === 0 ? '<div style="font-size:0.75rem;color:#666;padding:8px;">Sin componentes</div>' : ''}
                </div>
            </div>`;
    }).join('');
}

function toggleSection(srvId) {
    const body = document.getElementById('section-body-' + srvId);
    if (body) body.classList.toggle('visible');
}

function selectComponent(compId) {
    const comp = DATA.components.find(c => c.id === compId);
    if (comp) {
        selectedCompId = compId; selectedServerId = null;
        showComponentDetail(comp); highlightNode(compId); zoomToNode(comp, isMobile() ? 2 : 2.5);
        renderPanel();
    }
}

function highlightServer(srvId) {
    document.querySelectorAll('.server-section').forEach(el => el.style.borderColor = '');
    const section = document.getElementById('section-' + srvId);
    if (section) {
        section.style.borderColor = 'rgba(212,175,55,0.3)';
        document.getElementById('section-body-' + srvId).classList.add('visible');
    }
}

window.toggleSection = toggleSection;
window.selectComponent = selectComponent;
window.highlightServer = highlightServer;
window.closeDetailPanel = closeDetailPanel;

renderPanel();

// ─── RESIZE ───
let resizeTimeout;
window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => location.reload(), 600); });

// Zoom inicial
setTimeout(() => zoomToFit(), 500);

// Auto-refresh cada 5 minutos
setInterval(() => location.reload(), 300000);
</script>
</body>
</html>
