<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Catedral — Mapa Vivo Hermes .95</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>:root { --oro: #d4af37; --per: #f3e5ab; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html,body { width:100vw; height:100vh; overflow:hidden; background: linear-gradient(180deg, #0d0d14 0%, #1a1a2e 30%, #0f0f16 100%); color: var(--per); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
.header { position:fixed; top:0; left:0; right:0; height:52px; background: rgba(10,10,15,0.95); border-bottom: 1px solid rgba(212,175,55,0.2); display:flex; align-items:center; padding: 0 14px; z-index:100; backdrop-filter: blur(10px); }
.header .logo { font-size: 1.15rem; font-weight: bold; color: var(--oro); letter-spacing: 2px; white-space: nowrap; }
.header .subtitle { margin-left: 8px; color: #888; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header .stats { margin-left: auto; display:flex; align-items:center; gap: 6px; font-size: 0.68rem; }
.header .stat-item { display:none; align-items:center; gap: 3px; padding: 2px 7px; border-radius: 10px; background: rgba(255,255,255,0.03); }
.header .stat-item.stat-done { display:flex; color: #4caf50; }
.header .export-btn { background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.2); color: var(--oro); padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; cursor: pointer; margin-left: 6px; transition: all 0.2s; white-space: nowrap; }
.header .export-btn:hover { background: rgba(212,175,55,0.2); }
.header .mobile-menu-btn { display:flex; width: 34px; height: 34px; align-items:center; justify-content:center; background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; color: var(--oro); font-size: 1rem; cursor: pointer; margin-left: 6px; }
.header .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 6px #4caf50; animation: pulse-dot 2s infinite; flex-shrink: 0; margin-left: 6px; }
@keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
#main { position:fixed; top:52px; left:0; right:0; bottom:0; overflow:hidden; }
#bg-svg { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
#grafo { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }
#side-panel { position:fixed; top:0; right: -100%; width: min(85vw, 360px); height:100vh; background: rgba(12,12,18,0.98); border-left: 1px solid rgba(212,175,55,0.15); z-index:200; overflow-y:auto; padding: 65px 16px 20px; backdrop-filter: blur(12px); transition: right 0.35s cubic-bezier(0.4,0,0.2,1); box-shadow: -8px 0 40px rgba(0,0,0,0.5); }
#side-panel.visible { right: 0; }
#side-panel .drawer-close { position:absolute; top: 12px; left: 14px; width: 34px; height: 34px; display:flex; align-items:center; justify-content:center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #aaa; font-size: 1.1rem; cursor: pointer; }
#side-panel .drawer-title { font-size: 1rem; font-weight: bold; color: var(--oro); margin-left: 44px; margin-bottom: 14px; }
#side-panel-overlay { position:fixed; inset:0; background: rgba(0,0,0,0.5); z-index:190; opacity:0; pointer-events:none; transition: opacity 0.3s ease; }
#side-panel-overlay.visible { opacity:1; pointer-events:auto; }
#search-box { position:fixed; top: 52px; left: 50%; transform: translateX(-50%); z-index: 95; width: min(90vw, 420px); display:none; }
#search-box.visible { display: block; animation: searchIn 0.2s ease; }
@keyframes searchIn { from { opacity:0; transform: translateX(-50%) translateY(-10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
#search-input { width: 100%; padding: 10px 16px; border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; background: rgba(16,16,24,0.98); color: #fff; font-size: 0.9rem; outline: none; -webkit-appearance: none; }
#search-input::placeholder { color: #666; }
#search-results { max-height: 55vh; overflow-y: auto; background: rgba(16,16,24,0.98); border: 1px solid rgba(212,175,55,0.2); border-top: none; border-radius: 0 0 8px 8px; }
.search-result { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); transition: all 0.15s; display:flex; align-items:center; gap: 8px; font-size: 0.82rem; min-height: 44px; }
.search-result:hover, .search-result:active { background: rgba(212,175,55,0.08); }
.search-result .sr-icon { font-size: 1.1rem; }
.search-result .sr-type { margin-left: auto; font-size: 0.65rem; padding: 1px 6px; border-radius: 8px; background: rgba(255,255,255,0.05); color: #888; }
#filters { position:fixed; bottom: 10px; left: 10px; z-index: 92; display:flex; gap: 5px; flex-wrap: wrap; max-width: 65%; }
.filter-btn { background: rgba(20,20,30,0.9); border: 1px solid rgba(255,255,255,0.08); color: #aaa; padding: 5px 10px; border-radius: 14px; font-size: 0.68rem; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px); touch-action: manipulation; }
.filter-btn:hover, .filter-btn:active { border-color: rgba(212,175,55,0.3); color: #fff; }
.filter-btn.active { background: rgba(212,175,55,0.15); border-color: rgba(212,175,55,0.4); color: var(--oro); }
#legend { position:fixed; bottom: 10px; right: 10px; z-index: 92; background: rgba(20,20,30,0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 8px 12px; backdrop-filter: blur(8px); font-size: 0.65rem; max-width: 130px; }
#legend .leg-row { display:flex; align-items:center; gap: 8px; margin-bottom: 3px; }
#legend .leg-row:last-child { margin-bottom: 0; }
#legend .leg-item { display:flex; align-items:center; gap: 3px; color: #aaa; }
#legend .leg-dot { width: 7px; height: 7px; border-radius: 50%; }
#legend .leg-line { width: 12px; height: 2px; }
#detail-panel { position:fixed; bottom: -100%; left:0; right:0; max-height: 65vh; background: rgba(16,16,24,0.98); border-top: 1px solid rgba(212,175,55,0.2); border-radius: 20px 20px 0 0; z-index:180; padding: 18px; backdrop-filter: blur(12px); transition: bottom 0.35s cubic-bezier(0.4,0,0.2,1); overflow-y:auto; }
#detail-panel.visible { bottom: 0; }
#detail-panel .detail-header { display:flex; align-items:center; gap: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(212,175,55,0.15); }
#detail-panel .detail-icon { font-size: 1.6rem; }
#detail-panel .detail-title { font-size: 1rem; font-weight: bold; color: var(--oro); }
#detail-panel .detail-desc { font-size: 0.82rem; color: #aaa; line-height: 1.4; margin-bottom: 12px; }
#detail-panel .detail-meta { font-size: 0.75rem; color: #777; margin-bottom: 12px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; }
#detail-panel .detail-subtasks-title { font-size: 0.78rem; color: var(--oro); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
#detail-panel .detail-subtask { display:flex; align-items:flex-start; gap: 10px; padding: 10px; margin-bottom: 6px; background: rgba(255,255,255,0.03); border-radius: 8px; border-left: 3px solid; }
#detail-panel .detail-subtask.done { border-left-color: #4caf50; }
#detail-panel .detail-subtask.active { border-left-color: #2196f3; }
#detail-panel .detail-subtask.pending { border-left-color: #ff9800; }
#detail-panel .detail-subtask .dst-icon { font-size: 1.1rem; }
#detail-panel .detail-subtask .dst-content { flex: 1; }
#detail-panel .detail-subtask .dst-name { font-size: 0.85rem; color: #ddd; font-weight: 500; }
#detail-panel .detail-subtask .dst-human { font-size: 0.75rem; color: #aaa; line-height: 1.3; margin-top: 2px; }
#detail-panel .detail-subtask .dst-status { margin-left: auto; font-size: 0.65rem; padding: 2px 7px; border-radius: 8px; font-weight: 600; flex-shrink: 0; }
#detail-panel .close-btn { position:absolute; top: 8px; right: 12px; background:none; border:none; color:#888; font-size:1.3rem; cursor:pointer; padding:8px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; }
#detail-panel .close-btn:hover { color: var(--oro); }
#detail-panel .drag-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: -8px auto 8px; }
/* ===== MINI-NODOS DE SUBTAREAS EXPANDIDAS ===== */
.subtask-orbit { pointer-events: all; cursor: pointer; }
.subtask-orbit circle { transition: all 0.3s ease; }
.subtask-orbit text { font-size: 11px; pointer-events: none; text-anchor: middle; }
.subtask-orbit .st-label { font-size: 8px; fill: #aaa; text-anchor: middle; pointer-events: none; opacity: 0; transition: opacity 0.3s ease; }
.subtask-orbit:hover .st-label { opacity: 1; }
.subtask-orbit:hover circle { r: 14; stroke-width: 2; }
.subtask-link { fill: none; stroke: rgba(212,175,55,0.15); stroke-width: 1; stroke-dasharray: 3,3; pointer-events: none; }
.comp-node.expanded circle { stroke-width: 3; stroke-opacity: 0.9; }
.comp-node.collapsed .subtask-orbit { display: none; }
.comp-node.collapsed .subtask-link { display: none; }
/* ===== SERVIDORES EXPANDIDOS/COLAPSADOS ===== */
.server-node.collapsed .server-comp-orbit { display: none; }
.server-node.collapsed .server-comp-link { display: none; }
.server-node.expanded .srv-outer { stroke-width: 4; stroke-opacity: 1; filter: drop-shadow(0 0 8px var(--oro)); }
/* ===== NIVEL 3 - MINI-NODOS DE SUBTAREAS EXPANDIDAS ===== */
.l3-orbit { pointer-events: all; cursor: pointer; }
.l3-orbit circle { transition: all 0.2s ease; }
.l3-orbit text { font-size: 8px; pointer-events: none; text-anchor: middle; }
.l3-orbit .l3-label { font-size: 6px; fill: #888; text-anchor: middle; pointer-events: none; opacity: 0; transition: opacity 0.2s ease; }
.l3-orbit:hover .l3-label { opacity: 1; }
.l3-orbit:hover circle { r: 9; stroke-width: 1.5; }
.l3-link { fill: none; stroke: rgba(212,175,55,0.1); stroke-width: 0.8; stroke-dasharray: 2,2; pointer-events: none; }
.subtask-orbit.expanded-l3 circle { r: 14; stroke-width: 2; }
/* Colores de estado para mini-nodos */
.st-done { fill: rgba(76,175,80,0.15); stroke: #4caf50; }
.st-active { fill: rgba(33,150,243,0.15); stroke: #2196f3; }
.st-pending { fill: rgba(255,152,0,0.15); stroke: #ff9800; }
.tooltip { position:fixed; padding: 12px; background: rgba(16,14,10,0.98); border: 1px solid var(--oro); border-radius: 10px; max-width: min(280px, 80vw); z-index:200; pointer-events:none; opacity:0; transition: opacity 0.25s; box-shadow: 0 8px 30px rgba(0,0,0,0.7); font-size: 0.8rem; }
.tooltip.visible { opacity:1; }
.tooltip .tt-title { font-size: 0.95rem; font-weight: bold; color: var(--oro); margin-bottom: 4px; }
.tooltip .tt-desc { font-size: 0.78rem; color: #ccc; line-height: 1.4; margin-bottom: 4px; }
.tooltip .tt-meta { font-size: 0.72rem; color: #888; }
.server-section { margin-bottom: 12px; border: 1px solid rgba(212,175,55,0.08); border-radius: 10px; overflow:hidden; transition: all 0.3s ease; }
.server-section-header { display:flex; align-items:center; gap: 8px; padding: 12px 14px; background: rgba(212,175,55,0.04); cursor: pointer; transition: all 0.3s ease; min-height: 48px; }
.server-section-header:active { background: rgba(212,175,55,0.08); }
.server-section-header .sh-icon { font-size: 1.3rem; }
.server-section-header .sh-name { font-weight: bold; color: #fff; font-size: 0.95rem; }
.server-section-header .sh-status { margin-left: auto; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; text-transform: uppercase; font-weight: bold; }
.server-section-header .sh-status.online { background: rgba(76,175,80,0.15); color: #4caf50; }
.server-section-header .sh-status.offline { background: rgba(244,67,54,0.15); color: #f44336; }
.server-section-header .sh-status.unknown { background: rgba(255,152,0,0.15); color: #ff9800; }
.server-section-header .sh-count { margin-left: 8px; font-size: 0.7rem; color: #888; }
.server-section-body { display: none; padding: 0 14px 12px; animation: fadeIn 0.3s ease; }
.server-section-body.visible { display: block; }
@keyframes fadeIn { from { opacity:0; transform: translateY(-5px); } to { opacity:1; transform: translateY(0); } }
.comp-card { background: rgba(25,25,35,0.8); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; margin-top: 8px; cursor: pointer; transition: all 0.2s ease; }
.comp-card:active { border-color: rgba(212,175,55,0.25); background: rgba(212,175,55,0.03); }
.comp-card.active { border-color: rgba(212,175,55,0.4); background: rgba(212,175,55,0.06); }
.comp-card .comp-header { display:flex; align-items:center; gap: 8px; }
.comp-card .comp-icon { font-size: 1.1rem; }
.comp-card .comp-name { font-weight: 600; font-size: 0.85rem; color: #ddd; }
.comp-card .comp-desc { font-size: 0.75rem; color: #999; line-height: 1.3; margin: 4px 0; padding-left: 26px; }
.comp-card .comp-meta { font-size: 0.68rem; color: #777; padding-left: 26px; display:flex; gap: 8px; flex-wrap: wrap; }
.comp-card .comp-progress { padding-left: 26px; margin-top: 4px; }
.comp-card .progress-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.comp-card .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.channel-label { text-anchor: middle; pointer-events: none; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.15); border-radius: 2px; }

@media (min-width: 768px) {
    .header { height: 56px; padding: 0 18px; }
    .header .subtitle { display: block; max-width: 220px; }
    .header .stats .stat-item { display:flex; }
    .header .mobile-menu-btn { display: none; }
    #main { right: 340px; }
    #side-panel { position:fixed; top:56px; right:0; width: 340px; height: calc(100vh - 56px); padding: 20px; box-shadow: none; z-index:90; transition: none; }
    #side-panel.visible { right: 0; }
    #side-panel .drawer-close, #side-panel .drawer-title { display: none; }
    #side-panel-overlay { display: none; }
    #detail-panel { position:fixed; top:56px; right:340px; width:300px; left:auto; bottom:auto; max-height: calc(100vh - 56px); border-radius: 0 0 0 16px; border-top: none; border-left: 1px solid rgba(212,175,55,0.2); z-index:85; transition: opacity 0.3s ease, transform 0.3s ease; opacity: 0; transform: translateX(20px); pointer-events: none; }
    #detail-panel.visible { bottom: auto; opacity: 1; transform: translateX(0); pointer-events: auto; }
    #detail-panel .drag-handle { display: none; }
    .server-section-header { padding: 14px 18px; }
    .comp-card { padding: 12px; }
    .comp-card .comp-name { font-size: 0.9rem; }
    .comp-card .comp-desc { font-size: 0.78rem; padding-left: 30px; }
    .comp-card .comp-meta { font-size: 0.72rem; padding-left: 30px; }
    .comp-card .comp-progress { padding-left: 30px; }
    #filters { bottom: 14px; left: 14px; }
    .filter-btn { padding: 6px 12px; font-size: 0.72rem; }
    #legend { bottom: 14px; right: 360px; font-size: 0.7rem; max-width: none; padding: 10px 14px; }
}
@media (min-width: 1200px) {
    #main { right: 400px; }
    #side-panel { width: 400px; }
    #detail-panel { width: 340px; right: 400px; }
    #legend { right: 420px; }
}
@media (max-width: 380px) {
    .header { padding: 0 8px; height: 48px; }
    .header .logo { font-size: 0.95rem; letter-spacing: 1px; }
    .header .subtitle { display: none; }
    #main { top: 48px; }
    .filter-btn { padding: 4px 7px; font-size: 0.62rem; }
    #legend { display: none; }
}</style>
</head>
<body>

<div class="header">
    <div class="logo">🏰 LA CATEDRAL</div>
    <div class="subtitle">Mapa vivo del ecosistema Hermes .95</div>
    <div class="srv-health-bar" id="health-bar">
        <span class="srv-health" data-srv-id="srv-95" style="color:#888" title="HERMES .95: cargando...">●.95</span>
        <span class="srv-health" data-srv-id="srv-250" style="color:#888" title="PROD .250: cargando...">●.250</span>
        <span class="srv-health" data-srv-id="srv-241" style="color:#888" title="ESPEJO .241: cargando...">●.241</span>
        <span class="srv-health" data-srv-id="srv-240" style="color:#888" title="STAGING .240: cargando...">●.240</span>
        <span class="srv-health" data-srv-id="srv-99" style="color:#888" title="STAGING .99: cargando...">●.99</span>
        <span class="srv-health" data-srv-id="srv-50" style="color:#888" title="BACKUP .50: cargando...">●.50</span>
        <span class="srv-health" data-srv-id="srv-43" style="color:#888" title="RDP .43: cargando...">●.43</span>
    </div>
    <div class="stats">
        <span class="stat-item stat-done"><span>✅ 60</span></span>
        <span class="stat-item stat-active"><span>🔄 28</span></span>
        <span class="stat-item stat-pending"><span>⏳ 11</span></span>
        <span class="stat-item"><span>📋 99</span></span>
    </div>
    <button class="export-btn" onclick="exportJSON()">📥 JSON</button>
    <button class="changelog-btn" onclick="toggleChangelog()" title="Ver ultimos cambios">📝 Log</button>
    <div class="status-dot"></div>
    <button class="mobile-menu-btn" onclick="toggleDrawer()" aria-label="Menu">☰</button>
</div>

<div id="changelog-panel" style="display:none;position:fixed;top:56px;left:0;right:0;background:rgba(10,10,15,0.98);border-bottom:1px solid rgba(212,175,55,0.2);z-index:99;padding:12px 16px;font-size:0.72rem;color:#ccc;max-height:140px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.5);">
    <div style="font-weight:600;color:var(--oro);margin-bottom:6px;font-size:0.8rem;">📝 Historial de cambios detectados</div>
    <div id="changelog-content"></div>
    <button onclick="toggleChangelog()" style="position:absolute;top:6px;right:10px;background:none;border:none;color:#888;cursor:pointer;font-size:0.9rem;">✕</button>
</div>

<div id="side-panel-overlay" onclick="toggleDrawer()"></div>

<div id="search-box">
    <input type="text" id="search-input" placeholder="Buscar... (Ctrl+K)" autocomplete="off">
    <div id="search-results"></div>
</div>

<div id="main">
    <svg id="bg-svg" viewBox="0 0 1400 800" preserveAspectRatio="xMidYMid slice">
        <defs>
            <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a28"/><stop offset="100%" stop-color="#0a0a10"/></linearGradient>
            <radialGradient id="glowCenter" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="rgba(212,175,55,0.06)"/><stop offset="100%" stop-color="transparent"/></radialGradient>
        </defs>
        <polygon points="0,800 1400,800 1000,600 400,600" fill="url(#floorGrad)" opacity="0.5"/>
        <rect width="1400" height="800" fill="url(#glowCenter)" pointer-events="none"/>
        <g fill="#1a1a22"><rect x="50" y="0" width="70" height="800" rx="2"/><rect x="1280" y="0" width="70" height="800" rx="2"/></g>
        <g stroke="rgba(212,175,55,0.06)" stroke-width="1.5" fill="none">
            <path d="M 120 0 Q 700 350 1280 0"/>
            <path d="M 120 0 L 1280 800 M 1280 0 L 120 800"/>
        </g>
    </svg>
    <svg id="grafo"></svg>
</div>

<div id="filters">
    <button class="filter-btn active" data-filter="all" onclick="applyFilter('all')">📋 Todo</button>
    <button class="filter-btn" data-filter="active" onclick="applyFilter('active')">🔄 Activos</button>
    <button class="filter-btn" data-filter="pending" onclick="applyFilter('pending')">⏳ Pendientes</button>
    <button class="filter-btn" data-filter="done" onclick="applyFilter('done')">✅ Completados</button>
</div>

<div id="legend">
    <div class="leg-row">
        <span class="leg-item"><span class="leg-dot" style="background:#4caf52;"></span>Online</span>
        <span class="leg-item"><span class="leg-dot" style="background:#ff9800;"></span>Desc</span>
        <span class="leg-item"><span class="leg-dot" style="background:#f44336;"></span>Off</span>
    </div>
    <div class="leg-row">
        <span class="leg-item"><span class="leg-line" style="background:#d4af37;"></span>Canal</span>
        <span class="leg-item"><span class="leg-line" style="border-top:1px dashed rgba(212,175,55,0.3);background:transparent;height:0;"></span>Int</span>
    </div>
</div>

<div id="side-panel">
    <button class="drawer-close" onclick="toggleDrawer()">✕</button>
    <div class="drawer-title">Componentes</div>
    <div id="server-sections"></div>
</div>

<div id="detail-panel">
    <div class="drag-handle"></div>
    <button class="close-btn" onclick="closeDetailPanel()">✕</button>
    <div id="detail-content"></div>
</div>

function calcServerPositions() {
    var cx = W/2, cy = H/2;
    var positions = {};
    var centerIdx = -1;
    for(var i=0; i<DATA.servers.length; i++){ if(DATA.servers[i].id === 'srv-95'){ centerIdx=i; break; } }
    var n = DATA.servers.length - 1;
    var angleStep = (2*Math.PI)/Math.max(n,1);
    var R = 440;
    for(var i=0; i<DATA.servers.length; i++){
        var s = DATA.servers[i];
        if(s.id === 'srv-95'){
            positions[s.id] = {x: cx, y: cy};
        } else {
            var idx = i > centerIdx ? i-1 : i;
            var angle = idx * angleStep - Math.PI/2;
            positions[s.id] = {x: cx + Math.cos(angle)*R, y: cy + Math.sin(angle)*R*0.85};
        }
    }
    return positions;
}

function calcComponentPositions(srvPositions) {
    var positions = {};
    for(var ci=0; ci<DATA.components.length; ci++){
        var c = DATA.components[ci];
        var sp = srvPositions[c.server];
        if(!sp) continue;
        var srvComps = [];
        for(var j=0; j<DATA.components.length; j++){ if(DATA.components[j].server === c.server) srvComps.push(DATA.components[j]); }
        var idx = -1;
        for(var j=0; j<srvComps.length; j++){ if(srvComps[j].id === c.id){ idx=j; break; } }
        var count = srvComps.length;
        var isCenter = c.server === 'srv-95';
        var orbitR = isCenter ? 160 : 150;
        var angle;
        if(isCenter){
            angle = (2*Math.PI/count)*idx;
        } else {
            var angleToCenter = Math.atan2(cy - sp.y, cx - sp.x);
            var spread = Math.PI * 0.7;
            if(count === 1){
                angle = angleToCenter;
            } else {
                angle = angleToCenter - spread/2 + (spread / (count-1)) * idx;
            }
        }
        var x = sp.x + Math.cos(angle)*orbitR;
        var y = sp.y + Math.sin(angle)*orbitR;
        // Clamp dentro del viewBox con margen
        x = Math.max(COMP_R+PAD, Math.min(W-COMP_R-PAD, x));
        y = Math.max(COMP_R+PAD, Math.min(H-COMP_R-PAD, y));
        positions[c.id] = {x: x, y: y};
    }
    return positions;
}

function resolveCollisions(srvPos, compPos) {
    var allNodes = [];
    for(var i=0; i<DATA.servers.length; i++){
        var s = DATA.servers[i];
        var p = srvPos[s.id];
        allNodes.push({id: s.id, x: p.x, y: p.y, r: SRV_R_OUTER, type: 'srv'});
    }
    for(var ci=0; ci<DATA.components.length; ci++){
        var c = DATA.components[ci];
        var p = compPos[c.id];
        if(p) allNodes.push({id: c.id, x: p.x, y: p.y, r: COMP_R, type: 'comp', server: c.server});
    }
    var iterations = 0, maxIter = 100;
    while(iterations < maxIter){
        var moved = false;
        for(var i=0; i<allNodes.length; i++){
            for(var j=i+1; j<allNodes.length; j++){
                var a = allNodes[i], b = allNodes[j];
                var dx = b.x - a.x, dy = b.y - a.y;
                var dist = Math.sqrt(dx*dx + dy*dy);
                var minDist = a.r + b.r + PAD;
                if(dist < minDist && dist > 0){
                    var overlap = minDist - dist;
                    var nx = dx/dist, ny = dy/dist;
                    var push = overlap/2 + 1;
                    if(a.type === 'comp' && b.type === 'comp'){
                        a.x -= nx*push; a.y -= ny*push;
                        b.x += nx*push; b.y += ny*push;
                    } else if(a.type === 'comp' && b.type === 'srv'){
                        a.x -= nx*push*1.5; a.y -= ny*push*1.5;
                    } else if(a.type === 'srv' && b.type === 'comp'){
                        b.x += nx*push*1.5; b.y += ny*push*1.5;
                    }
                    // Clamp después de mover
                    if(a.type === 'comp'){ a.x = Math.max(COMP_R+PAD, Math.min(W-COMP_R-PAD, a.x)); a.y = Math.max(COMP_R+PAD, Math.min(H-COMP_R-PAD, a.y)); }
                    if(b.type === 'comp'){ b.x = Math.max(COMP_R+PAD, Math.min(W-COMP_R-PAD, b.x)); b.y = Math.max(COMP_R+PAD, Math.min(H-COMP_R-PAD, b.y)); }
                    moved = true;
                }
            }
        }
        if(!moved) break;
        iterations++;
    }
    for(var i=0; i<allNodes.length; i++){
        var n = allNodes[i];
        if(n.type === 'srv') srvPos[n.id] = {x: n.x, y: n.y};
        else compPos[n.id] = {x: n.x, y: n.y};
    }
}

function getConnectedNodes(nodeId) {
    var connected = new Set([nodeId]);
    var isServer = false;
    for(var i=0; i<servers.length; i++){ if(servers[i].id === nodeId){ isServer = true; break; } }
    if(isServer){
        for(var i=0; i<components.length; i++){ if(components[i].server === nodeId) connected.add(components[i].id); }
        for(var i=0; i<flows.length; i++){ var f = flows[i]; if(f.from === nodeId || f.to === nodeId){ connected.add(f.from); connected.add(f.to); } }
    } else {
        var comp = null;
        for(var i=0; i<components.length; i++){ if(components[i].id === nodeId){ comp = components[i]; break; } }
        if(comp){
            connected.add(comp.server);
            for(var i=0; i<components.length; i++){ if(components[i].server === comp.server) connected.add(components[i].id); }
        }
    }
    return connected;
}

function getConnectedFlows(nodeId) {
    var isServer = false;
    for(var i=0; i<servers.length; i++){ if(servers[i].id === nodeId){ isServer = true; break; } }
    var result = [];
    if(isServer){
        for(var i=0; i<flows.length; i++){ if(flows[i].from === nodeId || flows[i].to === nodeId) result.push(flows[i].id); }
    } else {
        var comp = null;
        for(var i=0; i<components.length; i++){ if(components[i].id === nodeId){ comp = components[i]; break; } }
        if(comp){ for(var i=0; i<flows.length; i++){ if(flows[i].from === comp.server || flows[i].to === comp.server) result.push(flows[i].id); } }
    }
    return result;
}

function shouldShowComponent(comp) {
    if(currentFilter === 'all') return true;
    var allDone = true;
    for(var i=0; i<comp.subtasks.length; i++){ if(comp.subtasks[i].status !== 'done'){ allDone = false; break; } }
    var hasActive = false;
    for(var i=0; i<comp.subtasks.length; i++){ if(comp.subtasks[i].status === 'active'){ hasActive = true; break; } }
    var hasPending = false;
    for(var i=0; i<comp.subtasks.length; i++){ if(comp.subtasks[i].status === 'pending'){ hasPending = true; break; } }
    if(currentFilter === 'done') return allDone;
    if(currentFilter === 'active') return hasActive && !allDone;
    if(currentFilter === 'pending') return hasPending;
    return true;
}

function highlightNode(nodeId) {
    var connected = getConnectedNodes(nodeId);
    var connectedFlows = getConnectedFlows(nodeId);
    d3.selectAll('.server-node, .comp-node').transition().duration(400)
        .style('opacity', function(d){ return connected.has(d.id) ? 1 : 0.15; });
    for(var i=0; i<linkElements.length; i++){
        var el = linkElements[i];
        var isConnected = connected.has(el.compId) || connected.has(el.srvId);
        el.line.transition().duration(400).attr('stroke-opacity', isConnected ? 0.6 : 0.05).attr('stroke-width', isConnected ? 2 : 1);
    }
    var fids = Object.keys(flowElements);
    for(var i=0; i<fids.length; i++){
        var fid = fids[i];
        var isConnected = false;
        for(var j=0; j<connectedFlows.length; j++){ if(connectedFlows[j] === fid){ isConnected = true; break; } }
        var el = flowElements[fid];
        el.path.transition().duration(400).attr('stroke-opacity', isConnected ? 0.8 : 0.05).attr('stroke-width', isConnected ? 3 : 1);
        el.label.transition().duration(400).style('opacity', isConnected ? 1 : 0.1);
        el.particle.transition().duration(400).style('opacity', isConnected ? 1 : 0.1);
    }
}

function resetHighlight() {
    d3.selectAll('.server-node, .comp-node').transition().duration(500).style('opacity', 1);
    for(var i=0; i<linkElements.length; i++){
        linkElements[i].line.transition().duration(500).attr('stroke-opacity', 0.06).attr('stroke-width', 1);
    }
    var fids = Object.keys(flowElements);
    for(var i=0; i<fids.length; i++){
        var el = flowElements[fids[i]];
        el.path.transition().duration(500).attr('stroke-opacity', 0.1).attr('stroke-width', 2);
        el.label.transition().duration(500).style('opacity', 1);
    }
}

function zoomToNode(node, scale) {
    var vw = document.getElementById('main').clientWidth || window.innerWidth || W;
    var vh = document.getElementById('main').clientHeight || window.innerHeight || H;
    svg.transition().duration(800).ease(d3.easeCubicInOut).call(zoom.transform,
        d3.zoomIdentity.translate(vw/2 - node.x*scale, vh/2 - node.y*scale).scale(scale));
}

function zoomToFit() {
    var vw = document.getElementById('main').clientWidth || window.innerWidth || W;
    var vh = document.getElementById('main').clientHeight || window.innerHeight || H;
    var allNodes = servers.concat(components);
    var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for(var i=0; i<allNodes.length; i++){
        if(allNodes[i].x < minX) minX = allNodes[i].x;
        if(allNodes[i].x > maxX) maxX = allNodes[i].x;
        if(allNodes[i].y < minY) minY = allNodes[i].y;
        if(allNodes[i].y > maxY) maxY = allNodes[i].y;
    }
    minX -= 120; maxX += 120; minY -= 120; maxY += 120;
    var dx = maxX - minX, dy = maxY - minY;
    var scale = Math.min(vw/dx, vh/dy, 1) * 0.88;
    var tx = (vw - dx*scale)/2 - minX*scale;
    var ty = (vh - dy*scale)/2 - minY*scale;
    svg.transition().duration(1000).ease(d3.easeCubicInOut).call(zoom.transform,
        d3.zoomIdentity.translate(tx, ty).scale(scale));
}

var searchBox = document.getElementById('search-box');
var searchInput = document.getElementById('search-input');
var searchResults = document.getElementById('search-results');

var searchIndex = [];
for(var i=0; i<DATA.servers.length; i++){
    var s = DATA.servers[i];
    searchIndex.push({type: 'servidor', id: s.id, name: s.name, icon: s.icon, desc: s.desc});
}
for(var i=0; i<DATA.components.length; i++){
    var c = DATA.components[i];
    searchIndex.push({type: 'componente', id: c.id, name: c.name, icon: c.icon, desc: c.human_desc, server: c.server});
    for(var j=0; j<c.subtasks.length; j++){
        var st = c.subtasks[j];
        searchIndex.push({type: 'subtarea', id: c.id + '-sub-' + j, name: st.name, icon: st.icon, desc: st.human_summary, parent: c.name});
    }
}

function openSearch() { searchBox.classList.add('visible'); searchInput.focus(); searchInput.value = ''; searchResults.innerHTML = ''; }
function closeSearch() { searchBox.classList.remove('visible'); searchResults.innerHTML = ''; }
function doSearch(query) {
    if(!query || query.length < 2){ searchResults.innerHTML = ''; return; }
    var q = query.toLowerCase();
    var results = [];
    for(var i=0; i<searchIndex.length; i++){
        var item = searchIndex[i];
        if(item.name.toLowerCase().indexOf(q) >= 0 || item.desc.toLowerCase().indexOf(q) >= 0) results.push(item);
    }
    results = results.slice(0, 10);
    var html = '';
    for(var i=0; i<results.length; i++){
        var r = results[i];
        var typeLabel = r.type === 'servidor' ? 'Srv' : r.type === 'componente' ? 'Comp' : 'Sub';
        html += '<div class="search-result" data-result-type="' + r.type + '" data-result-id="' + r.id + '">' +
            '<span class="sr-icon">' + r.icon + '</span><span>' + r.name + '</span>' +
            (r.parent ? '<span style="color:#888;font-size:0.65rem;">(' + r.parent + ')</span>' : '') +
            '<span class="sr-type">' + typeLabel + '</span></div>';
    }
    searchResults.innerHTML = html || '<div style="padding:10px;color:#888;font-size:0.8rem;">Sin resultados</div>';
    // Event delegation para los resultados
    searchResults.querySelectorAll('.search-result').forEach(function(el){
        el.addEventListener('click', function(){
            goToSearchResult(this.getAttribute('data-result-type'), this.getAttribute('data-result-id'));
        });
    });
}
function goToSearchResult(type, id) {
    closeSearch();
    if(type === 'servidor'){
        var srv = null;
        for(var i=0; i<servers.length; i++){ if(servers[i].id === id){ srv = servers[i]; break; } }
        if(srv){ selectedServerId = id; selectedCompId = null; closeDetailPanel(); highlightNode(id); zoomToNode(srv, srv.isCenter ? 1.3 : 1.8); highlightServer(id); }
    } else if(type === 'componente'){
        var comp = null;
        for(var i=0; i<components.length; i++){ if(components[i].id === id){ comp = components[i]; break; } }
        if(comp){ selectedCompId = id; selectedServerId = null; showComponentDetail(comp); highlightNode(id); zoomToNode(comp, 2.5); }
    } else if(type === 'subtarea'){
        var compId = id.split('-sub-')[0];
        var comp = null;
        for(var i=0; i<components.length; i++){ if(components[i].id === compId){ comp = components[i]; break; } }
        if(comp){ selectedCompId = compId; selectedServerId = null; showComponentDetail(comp); highlightNode(compId); zoomToNode(comp, 2.5); }
    }
}
searchInput.addEventListener('input', function(e){ doSearch(e.target.value); });
searchInput.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeSearch(); });
document.addEventListener('keydown', function(e){
    if((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); openSearch(); }
    if(e.key === 'Escape'){ closeSearch(); selectedCompId = null; selectedServerId = null; closeDetailPanel(); resetHighlight(); zoomToFit(); }
});
window.openSearch = openSearch; window.closeSearch = closeSearch; window.goToSearchResult = goToSearchResult;

var expandedNodes = {};

function collapseServerComponents(srv, g) {

    delete expandedServers[srv.id];
    d3.selectAll('.comp-node').filter(function(d){ return d.server === srv.id; }).each(function(d){
        var cG = d3.select(this);
        if(cG.classed('expanded')) collapseSubtasks(d, cG);
    });

        .attr('pointer-events', 'none');

function clickServerComp(comp, cG) {
    selectedCompId = comp.id;
    if(cG.classed('expanded')){
        collapseSubtasks(comp, cG);
    } else {
        d3.selectAll('.comp-node.expanded').filter(function(d){ return d.server === comp.server; }).each(function(dd){

        });

function expandSubtasks(comp, g) {
    g.classed('expanded', true).classed('collapsed', false);
    expandedNodes[comp.id] = true;
    var sts = comp.subtasks || [];
    if(sts.length === 0) return;
    var order = {'done': 0, 'active': 1, 'pending': 2};
    var sorted = sts.slice().sort(function(a, b){ return (order[a.status] || 99) - (order[b.status] || 99); });
    var maxShow = Math.min(sorted.length, 6);
    var angleStep = Math.PI / (maxShow + 1);
    var orbitR = compRadius + 28;
    var cx = comp.x || 0;
    var cy = comp.y || 0;
    var linkData = [];
    for(var i=0; i<maxShow; i++){
        var angle = Math.PI + (i+1)*angleStep;
        linkData.push({x1: cx, y1: cy, x2: cx + Math.cos(angle)*orbitR, y2: cy + Math.sin(angle)*orbitR, idx: i});
    }
    g.selectAll('.subtask-link').data(linkData).join('line')
        .attr('class', 'subtask-link')
        .attr('x1', function(d){ return d.x1; })
        .attr('y1', function(d){ return d.y1; })
        .attr('x2', function(d){ return d.x2; })
        .attr('y2', function(d){ return d.y2; })
        .style('opacity', 0)
        .transition().duration(400).delay(function(d,i){ return i*60; })
        .style('opacity', 1);
    var nodeData = [];
    for(var i=0; i<maxShow; i++){
        var st = sorted[i];
        var angle = Math.PI + (i+1)*angleStep;
        nodeData.push({idx: i, st: st, x: cx + Math.cos(angle)*orbitR, y: cy + Math.sin(angle)*orbitR, statusClass: 'st-' + st.status});
    }
    var stGroups = g.selectAll('.subtask-orbit').data(nodeData).join('g')
        .attr('class', function(d){ return 'subtask-orbit ' + d.statusClass; })
        .attr('transform', function(d){ return 'translate('+d.x+','+d.y+')'; })
        .style('opacity', 0).style('cursor', 'pointer')
        .on('click', function(event, d){
            event.stopPropagation();
            if(d.st.children && d.st.children.length > 0){
                var stG = d3.select(this);
                if(stG.classed('expanded-l3')){
                    collapseLevel3(stG);
                } else {
                    collapseAllLevel3();
                    expandLevel3(d.st, comp, stG);
                }
            } else {
                showSubtaskDetail(d.st, comp);
            }
        })
        .on('mouseover', function(event, d){
            tooltip.html('&lt;div class="tt-title"&gt;' + d.st.icon + ' ' + d.st.name + '&lt;/div&gt;' +
                '&lt;div class="tt-desc"&gt;' + d.st.human_summary + '&lt;/div&gt;' +
                '&lt;div style="font-size:0.72rem;color:#888;margin-top:4px;"&gt;Estado: ' + d.st.status + '&lt;/div&gt;')
                .classed('visible', true)
                .style('left', Math.min(event.pageX + 12, window.innerWidth - 300) + 'px')
                .style('top', Math.min(event.pageY + 12, window.innerHeight - 200) + 'px');
        })
        .on('mouseout', function(){ tooltip.classed('visible', false); });
    stGroups.append('circle').attr('r', 10).attr('class', function(d){ return d.statusClass; }).attr('stroke-width', 1.5).attr('fill-opacity', 0.8);
    stGroups.append('text').attr('dy', 4).attr('font-size', '10px').text(function(d){ return d.st.icon; });
    stGroups.append('text').attr('dy', 20).attr('class', 'st-label').text(function(d){ return d.st.name.length > 8 ? d.st.name.slice(0,8)+'...' : d.st.name; });
    stGroups.transition().duration(400).delay(function(d,i){ return i*60; }).style('opacity', 1);
    if(sorted.length > 6){
        g.append('text').attr('class', 'more-indicator')
            .attr('x', cx + orbitR + 12).attr('y', cy - 5)
            .attr('fill', '#888').attr('font-size', '9px')
            .text('+' + (sorted.length - 6) + ' mas')
            .style('opacity', 0)
            .transition().duration(400).style('opacity', 1);
    }
}

function collapseSubtasks(comp, g) {
    g.classed('expanded', false).classed('collapsed', true);
    delete expandedNodes[comp.id];
    g.selectAll('.subtask-orbit').each(function(){
        var stG = d3.select(this);
        if(stG.classed('expanded-l3')) collapseLevel3(stG);
    });
    g.selectAll('.subtask-orbit').transition().duration(300).style('opacity', 0).remove();
    g.selectAll('.subtask-link').transition().duration(300).style('opacity', 0).remove();
    g.selectAll('.more-indicator').transition().duration(300).style('opacity', 0).remove();
}

var expandedL3 = {};

function expandLevel3(st, comp, stG) {
    stG.classed('expanded-l3', true);
    expandedL3[st.name] = true;
    var children = st.children || [];
    if(children.length === 0) return;
    var cx = 0, cy = 0;
    var l3OrbitR = 22;
    var angleStep = (Math.PI * 2) / children.length;
    var offsetAngle = Math.PI / 4;
    var linkData = [];
    var nodeData = [];
    for(var i=0; i<children.length; i++){
        var angle = offsetAngle + i * angleStep;
        var lx = cx + Math.cos(angle) * l3OrbitR;
        var ly = cy + Math.sin(angle) * l3OrbitR;
        linkData.push({x1: cx, y1: cy, x2: lx, y2: ly, idx: i});
        nodeData.push({idx: i, child: children[i], x: lx, y: ly, statusClass: 'st-' + children[i].status});
    }
    stG.selectAll('.l3-link').data(linkData).join('line')
        .attr('class', 'l3-link')
        .attr('x1', function(d){ return d.x1; }).attr('y1', function(d){ return d.y1; })
        .attr('x2', function(d){ return d.x2; }).attr('y2', function(d){ return d.y2; })
        .style('opacity', 0)
        .transition().duration(300).delay(function(d,i){ return i*40; })
        .style('opacity', 1);
    var l3Groups = stG.selectAll('.l3-orbit').data(nodeData).join('g')
        .attr('class', function(d){ return 'l3-orbit ' + d.statusClass; })
        .attr('transform', function(d){ return 'translate('+d.x+','+d.y+')'; })
        .style('opacity', 0).style('cursor', 'pointer')
        .on('click', function(event, d){ event.stopPropagation(); showL3Detail(d.child, st, comp); })
        .on('mouseover', function(event, d){
            tooltip.html('&lt;div class="tt-title"&gt;' + d.child.icon + ' ' + d.child.name + '&lt;/div&gt;' +
                '&lt;div class="tt-desc"&gt;' + d.child.human_summary + '&lt;/div&gt;' +
                '&lt;div style="font-size:0.72rem;color:#888;margin-top:4px;"&gt;Estado: ' + d.child.status + '&lt;/div&gt;')
                .classed('visible', true)
                .style('left', Math.min(event.pageX + 12, window.innerWidth - 300) + 'px')
                .style('top', Math.min(event.pageY + 12, window.innerHeight - 200) + 'px');
        })
        .on('mouseout', function(){ tooltip.classed('visible', false); });
    l3Groups.append('circle').attr('r', 7).attr('class', function(d){ return d.statusClass; }).attr('stroke-width', 1).attr('fill-opacity', 0.9);
    l3Groups.append('text').attr('dy', 2.5).attr('font-size', '8px').text(function(d){ return d.child.icon; });
    l3Groups.append('text').attr('dy', 13).attr('class', 'l3-label').text(function(d){ return d.child.name.length > 6 ? d.child.name.slice(0,6)+'...' : d.child.name; });
    l3Groups.transition().duration(300).delay(function(d,i){ return i*40; }).style('opacity', 1);
}

function collapseLevel3(stG) {
    stG.classed('expanded-l3', false);
    stG.selectAll('.l3-link').transition().duration(200).style('opacity', 0).remove();
    stG.selectAll('.l3-orbit').transition().duration(200).style('opacity', 0).remove();
}

function collapseAllLevel3() {
    d3.selectAll('.subtask-orbit.expanded-l3').each(function(){
        collapseLevel3(d3.select(this));
    });
}

function showL3Detail(child, st, comp) {
    var panel = document.getElementById('detail-panel');
    var content = document.getElementById('detail-content');
    var color = child.status === 'done' ? '#4caf50' : child.status === 'active' ? '#2196f3' : '#ff9800';
    content.innerHTML = '&lt;div class="detail-header"&gt;&lt;span class="detail-icon"&gt;' + child.icon + '&lt;/span&gt;' +
        '&lt;span class="detail-title"&gt;' + child.name + '&lt;/span&gt;&lt;/div&gt;' +
        '&lt;div class="detail-desc"&gt;' + child.human_summary + '&lt;/div&gt;' +
        '&lt;div class="detail-meta"&gt;&lt;div&gt;📦 Subtarea: ' + st.name + '&lt;/div&gt;' +
        '&lt;div&gt;🔧 Componente: ' + comp.name + '&lt;/div&gt;' +
        '&lt;div&gt;📊 Estado: &lt;span style="color:' + color + '"&gt;' + child.status + '&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;' +
        '&lt;div style="font-size:0.75rem;color:#888;margin-top:12px;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;"&gt;' +
        '💡 Tarea detallada dentro de ' + st.name + ' → ' + comp.name + '&lt;/div&gt;';
    panel.classList.add('visible');
}

function showSubtaskDetail(st, comp) {
    var panel = document.getElementById('detail-panel');
    var content = document.getElementById('detail-content');
    var color = st.status === 'done' ? '#4caf50' : st.status === 'active' ? '#2196f3' : '#ff9800';
    content.innerHTML = '&lt;div class="detail-header"&gt;&lt;span class="detail-icon"&gt;' + st.icon + '&lt;/span&gt;' +
        '&lt;span class="detail-title"&gt;' + st.name + '&lt;/span&gt;&lt;/div&gt;' +
        '&lt;div class="detail-desc"&gt;' + st.human_summary + '&lt;/div&gt;' +
        '&lt;div class="detail-meta"&gt;&lt;div&gt;📦 Componente: ' + comp.name + '&lt;/div&gt;' +
        '&lt;div&gt;🖥️ Servidor: ' + comp.parentServer.name + '&lt;/div&gt;' +
        '&lt;div&gt;📊 Estado: &lt;span style="color:' + color + '"&gt;' + st.status + '&lt;/span&gt;&lt;/div&gt;' +
        '&lt;div&gt;📝 Descripción técnica: ' + st.desc + '&lt;/div&gt;&lt;/div&gt;' +
        '&lt;div style="font-size:0.75rem;color:#888;margin-top:12px;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;"&gt;' +
        '💡 Esta subtarea forma parte del componente "' + comp.name + '" en el servidor ' + comp.parentServer.name + '.&lt;/div&gt;';
    panel.classList.add('visible');
}

function showComponentDetail(comp) {
    selectedCompId = comp.id;
    var panel = document.getElementById('detail-panel');
    var content = document.getElementById('detail-content');
    var subtasksHtml = '';
    for(var i=0; i<comp.subtasks.length; i++){
        var st = comp.subtasks[i];
        var color = st.status === 'done' ? '#4caf50' : st.status === 'active' ? '#2196f3' : '#ff9800';
        subtasksHtml += '<div class="detail-subtask ' + st.status + '">' +
            '<span class="dst-icon">' + st.icon + '</span>' +
            '<div class="dst-content"><div class="dst-name">' + st.name + '</div>' +
            '<div class="dst-human">' + st.human_summary + '</div></div>' +
            '<span class="dst-status" style="background: ' + color + '20; color: ' + color + ';">' + st.status + '</span></div>';
    }
    content.innerHTML = '<div class="detail-header"><span class="detail-icon">' + comp.icon + '</span>' +
        '<span class="detail-title">' + comp.name + '</span></div>' +
        '<div class="detail-desc">' + comp.human_desc + '</div>' +
        '<div class="detail-meta"><div> Servidor: ' + comp.parentServer.name + '</div>' +
        '<div> Horario: ' + comp.schedule + '</div>' +
        '<div> Ultima: ' + comp.last_run + '</div>' +
        '<div> Progreso: ' + comp.progress + '%</div></div>' +
        '<div class="detail-subtasks-title">Subtareas (' + comp.subtasks.length + ')</div>' + subtasksHtml;
    panel.classList.add('visible');
    if(isMobile() && drawerOpen) toggleDrawer();
}
function closeDetailPanel() { document.getElementById('detail-panel').classList.remove('visible'); }
window.closeDetailPanel = closeDetailPanel;

function exportJSON() {
    var exportData = JSON.parse(JSON.stringify(DATA));
    exportData.export_info = {exported_at: new Date().toISOString(), version: DATA.meta.version, stats: STATS};
    var blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url;
    a.download = 'la_catedral_estado_' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
window.exportJSON = exportJSON;

function renderPanel() {
    var container = document.getElementById('server-sections');
    var html = '';
    for(var si=0; si<DATA.servers.length; si++){
        var srv = DATA.servers[si];
        var srvComps = [];
        for(var ci=0; ci<DATA.components.length; ci++){ if(DATA.components[ci].server === srv.id) srvComps.push(DATA.components[ci]); }
        var compCount = srvComps.length;
        var subtaskCount = 0;
        for(var ci=0; ci<srvComps.length; ci++) subtaskCount += srvComps[ci].subtasks ? srvComps[ci].subtasks.length : 0;
        html += '<div class="server-section" id="section-' + srv.id + '">' +
            '<div class="server-section-header" data-srv-id="' + srv.id + '">' +
            '<span class="sh-icon">' + srv.icon + '</span>' +
            '<span class="sh-name">' + srv.name + '</span>' +
            '<span class="sh-count">' + compCount + ' / ' + subtaskCount + '</span>' +
            '<span class="sh-status ' + srv.status + '">' + srv.status + '</span></div>' +
            '<div class="server-section-body ' + (srv.id === 'srv-95' ? 'visible' : '') + '" id="section-body-' + srv.id + '">' +
            '<div style="font-size:0.75rem;color:#999;margin:8px 0;line-height:1.3;">' + srv.desc + '</div>';
        for(var ci=0; ci<srvComps.length; ci++){
            var c = srvComps[ci];
            var done = 0;
            for(var j=0; j<c.subtasks.length; j++){ if(c.subtasks[j].status === 'done') done++; }
            var progress = Math.round((done/c.subtasks.length)*100);
            var progColor = done === c.subtasks.length ? '#4caf50' : done > 0 ? '#d4af37' : '#888';
            html += '<div class="comp-card ' + (selectedCompId === c.id ? 'active' : '') + '" id="comp-' + c.id + '" data-comp-id="' + c.id + '">' +
                '<div class="comp-header"><span class="comp-icon">' + c.icon + '</span><span class="comp-name">' + c.name + '</span></div>' +
                '<div class="comp-desc">' + c.human_desc + '</div>' +
                '<div class="comp-meta"><span> ' + c.schedule + '</span><span> ' + c.subtasks.length + '</span></div>' +
                '<div class="comp-progress"><div class="progress-bar"><div class="progress-fill" style="width:' + progress + '%;background:' + progColor + ';"></div></div></div></div>';
        }
        if(compCount === 0) html += '<div style="font-size:0.75rem;color:#666;padding:8px;">Sin componentes</div>';
        html += '</div></div>';
    }
    container.innerHTML = html;
}

function toggleSection(srvId) {
    var body = document.getElementById('section-body-' + srvId);
    if(body) body.classList.toggle('visible');
}

function selectComponent(compId) {
    var comp = null;
    for(var i=0; i<DATA.components.length; i++){ if(DATA.components[i].id === compId){ comp = DATA.components[i]; break; } }
    if(comp){
        selectedCompId = compId; selectedServerId = null;
        showComponentDetail(comp); highlightNode(compId); zoomToNode(comp, isMobile() ? 2 : 2.5);
        renderPanel();
    }
}

function highlightServer(srvId) {
    var sections = document.querySelectorAll('.server-section');
    for(var i=0; i<sections.length; i++){ sections[i].style.borderColor = ''; }
    var section = document.getElementById('section-' + srvId);
    if(section){
        section.style.borderColor = 'rgba(212,175,55,0.3)';
        document.getElementById('section-body-' + srvId).classList.add('visible');
    }
}

window.toggleSection = toggleSection;
window.selectComponent = selectComponent;
window.highlightServer = highlightServer;
window.closeDetailPanel = closeDetailPanel;
window.toggleChangelog = function(){
    var p = document.getElementById('changelog-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
    if(p.style.display === 'block') renderChangelog();
};
function renderChangelog(){
    var c = document.getElementById('changelog-content');
    if(!CHANGELOG || CHANGELOG.length === 0){
        c.innerHTML = '<div style="color:#888;"'+'>Sin cambios recientes.</div>';
        return;
    }
    var html = '';
    for(var i=0; i<CHANGELOG.length; i++){
        var item = CHANGELOG[i];
        var color = item.startsWith('+') ? '#4caf50' : item.startsWith('-') ? '#f44336' : item.startsWith('~') ? '#ffaa00' : '#ccc';
        html += '<div style="padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05);"><span style="color:'+color+'">'+item.charAt(0)+'</span> '+item.substring(1).trim()+'</div>';
    }
    c.innerHTML = html;
}

renderPanel();

// Event delegation para comp-cards y section headers (evita onclick inline con comillas)
document.getElementById('server-sections').addEventListener('click', function(e){
    var card = e.target.closest('.comp-card');
    if(card){
        e.stopPropagation();
        var compId = card.getAttribute('data-comp-id');
        if(compId) selectComponent(compId);
        return;
    }
    var header = e.target.closest('.server-section-header');
    if(header){
        e.stopPropagation();
        var srvId = header.getAttribute('data-srv-id');
        if(srvId) toggleSection(srvId);
    }
});

var resizeTimeout;
window.addEventListener('resize', function(){ clearTimeout(resizeTimeout); resizeTimeout = setTimeout(function(){ location.reload(); }, 600); });

setTimeout(function(){ zoomToFit(); updateHealthBar(); }, 500);
setInterval(function(){ location.reload(); }, 300000);
</script>
