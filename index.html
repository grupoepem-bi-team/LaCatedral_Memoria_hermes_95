    .attr('fill', 'rgba(10,10,15,0.85)')
    .attr('stroke', d => d.color)
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.3);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? -12 : -8)
    .attr('font-size', d => d.isCenter ? '2rem' : '1.5rem')
    .text(d => d.icon);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? 18 : 14)
    .attr('fill', '#fff').attr('font-size', d => d.isCenter ? '13px' : '11px')
    .attr('font-weight', 'bold').attr('letter-spacing', '1px')
    .text(d => d.name);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? 34 : 26)
    .attr('fill', d => d.status === 'online' ? '#4caf50' : '#f44336')
    .attr('font-size', '9px')
    .text(d => d.status);

// === INTERACCIONES SERVIDOR ===
serverGroup.on('mouseover', function(event, d) {
    d3.select(this).select('circle').attr('stroke-width', 4).attr('stroke-opacity', 1);
    const servicesHtml = d.services.map(s => `<span>${s}</span>`).join('');
    tooltip.html(`
        <div class="tt-title">${d.icon} ${d.name}</div>
        <div class="tt-desc">${d.desc}</div>
        <div class="tt-meta">IP: ${d.ip} | Estado: ${d.status}</div>
        <div class="tt-services">${servicesHtml}</div>
    `).style('opacity', 1)
    .style('left', Math.min(event.pageX + 16, window.innerWidth - 420) + 'px')
    .style('top', Math.min(event.pageY + 16, window.innerHeight - 200) + 'px');
})
.on('mouseout', function() {
    d3.select(this).select('circle').attr('stroke-width', d => d.isCenter ? 3 : 2).attr('stroke-opacity', 0.6);
    tooltip.style('opacity', 0);
})
.on('click', function(event, d) {
    highlightServer(d.id);
    const scale = d.isCenter ? 1.5 : 2.2;
    svg.transition().duration(600).call(zoom.transform,
        d3.zoomIdentity.translate(width/2 - d.x*scale, height/2 - d.y*scale).scale(scale));
});

// === PANEL LATERAL ===
function renderPanel() {
    // Servidores
    const srvList = document.getElementById('server-list');
    srvList.innerHTML = DATA.servers.map(s => `
        <div class="srv-card ${s.id === 'srv-95' ? 'active' : ''}" data-id="${s.id}" onclick="highlightServer('${s.id}')">
            <div class="srv-header">
                <span class="srv-icon">${s.icon}</span>
                <span class="srv-name">${s.name}</span>
                <span class="srv-status ${s.status}">${s.status}</span>
            </div>
            <div class="srv-desc">${s.desc}</div>
            <div class="srv-services">${s.services.map(x => `<span>${x}</span>`).join('')}</div>
        </div>
    `).join('');
    
    // Flujos
    const flowList = document.getElementById('flow-list');
    flowList.innerHTML = DATA.flows.map(f => `
        <div class="flow-card" onclick="centerOnFlow('${f.id}')">
            <div class="flow-name">${f.icon} ${f.name}</div>
            <div class="flow-desc">${f.desc}</div>
            <div class="flow-meta">
                <span>${f.from.replace('srv-','')} &rarr; ${f.to.replace('srv-','')}</span>
                <span class="flow-status active">${f.status}</span>
            </div>
        </div>
    `).join('');
    
    // Componentes con subtareas expandibles
    const compList = document.getElementById('component-list');
    compList.innerHTML = DATA.components.map(c => `
        <div class="comp-card" id="comp-${c.id}" onclick="toggleSubtasks('${c.id}')">
            <div class="comp-header">
                <span>${c.icon}</span>
                <span class="comp-name">${c.name}</span>
                <span class="expand-icon">&#9654;</span>
            </div>
            <div class="comp-desc">${c.human_desc}</div>
            <div class="comp-meta">&#9201; ${c.schedule} | Ultima: ${c.last_run} | ${c.subtasks.length} subtareas</div>
            <div class="subtasks-container" id="subtasks-${c.id}">
                ${c.subtasks.map(st => `
                    <div class="subtask">
                        <span class="st-icon">${st.icon}</span>
                        <div class="st-content">
                            <div class="st-name">${st.name}</div>
                            <div class="st-desc">${st.desc}</div>
                        </div>
                        <span class="st-status ${st.status}">${st.status}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function highlightServer(srvId) {
    document.querySelectorAll('.srv-card').forEach(el => el.classList.remove('active'));
    const card = document.querySelector(`[data-id="${srvId}"]`);
    if (card) card.classList.add('active');
}

function centerOnFlow(flowId) {
    const f = DATA.flows.find(x => x.id === flowId);
    if (f && f.midX) {
        svg.transition().duration(600).call(zoom.transform,
            d3.zoomIdentity.translate(width/2 - f.midX*1.8, height/2 - f.midY*1.8).scale(1.8));
    }
}

function toggleSubtasks(compId) {
    const card = document.getElementById('comp-' + compId);
    const container = document.getElementById('subtasks-' + compId);
    if (!card || !container) return;
    
    card.classList.toggle('expanded');
    container.classList.toggle('visible');
}

window.highlightServer = highlightServer;
window.centerOnFlow = centerOnFlow;
window.toggleSubtasks = toggleSubtasks;

renderPanel();

// Auto-refresh cada 60 segundos
setInterval(() => {
    document.querySelector('.last-update').textContent = 'Actualizando...';
    setTimeout(() => location.reload(), 2000);
}, 60000);
</script>
</body>
</html>
