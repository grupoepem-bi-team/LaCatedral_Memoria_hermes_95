<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Catedral — Mapa Vivo Hermes .95</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root { --oro: #d4af37; --per: #f3e5ab; --dark: #0a0a0f; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html,body { width:100vw; height:100vh; overflow:hidden; background: linear-gradient(180deg, #0d0d14 0%, #1a1a2e 30%, #0f0f16 100%); color: var(--per); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

/* ─── HEADER ─── */
.header { position:fixed; top:0; left:0; right:0; height:56px; background: rgba(10,10,15,0.95); border-bottom: 1px solid rgba(212,175,55,0.2); display:flex; align-items:center; padding: 0 16px; z-index:100; backdrop-filter: blur(10px); }
.header .logo { font-size: 1.2rem; font-weight: bold; color: var(--oro); letter-spacing: 2px; white-space: nowrap; }
.header .subtitle { margin-left: 10px; color: #888; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header .stats { margin-left: auto; display:flex; align-items:center; gap: 8px; font-size: 0.7rem; }
.header .stat-item { display:none; } /* Oculto por defecto en mobile */
.header .stat-item.stat-done { display:flex; } /* Solo contador total visible */
.header .stat-item .stat-count { display:flex; align-items:center; gap: 4px; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.03); color: #aaa; }
.header .export-btn { background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.2); color: var(--oro); padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; cursor: pointer; margin-left: 6px; transition: all 0.2s; white-space: nowrap; }
.header .export-btn:hover { background: rgba(212,175,55,0.2); }
.header .mobile-menu-btn { display:flex; width: 36px; height: 36px; align-items:center; justify-content:center; background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; color: var(--oro); font-size: 1.1rem; cursor: pointer; margin-left: 8px; }
.header .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 8px #4caf50; animation: pulse-dot 2s infinite; flex-shrink: 0; }
@keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.header .last-update { display: none; }

/* ─── MAIN / GRAFO ─── */
#main { position:fixed; top:56px; left:0; right:0; bottom:0; overflow:hidden; transition: right 0.3s ease; }
#main.panel-open { right: 340px; } /* Solo en desktop */
#bg-svg { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
#grafo { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }

/* ─── SIDE PANEL (MOBILE DRAWER) ─── */
#side-panel { position:fixed; top:0; right: -100%; width: 85%; max-width: 360px; height:100vh; background: rgba(12,12,18,0.98); border-left: 1px solid rgba(212,175,55,0.15); z-index:200; overflow-y:auto; padding: 70px 16px 20px; backdrop-filter: blur(12px); transition: right 0.35s cubic-bezier(0.4,0,0.2,1); box-shadow: -8px 0 40px rgba(0,0,0,0.5); }
#side-panel.visible { right: 0; }
#side-panel .drawer-close { position:absolute; top: 14px; left: 16px; width: 36px; height: 36px; display:flex; align-items:center; justify-content:center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #aaa; font-size: 1.2rem; cursor: pointer; }
#side-panel .drawer-title { font-size: 1.1rem; font-weight: bold; color: var(--oro); margin-left: 50px; margin-bottom: 16px; }
#side-panel-overlay { position:fixed; inset:0; background: rgba(0,0,0,0.5); z-index:190; opacity:0; pointer-events:none; transition: opacity 0.3s ease; }
#side-panel-overlay.visible { opacity:1; pointer-events:auto; }

/* ─── SEARCH ─── */
#search-box { position:fixed; top: 56px; left: 50%; transform: translateX(-50%); z-index: 95; width: min(90vw, 400px); display:none; }
#search-box.visible { display: block; animation: searchIn 0.2s ease; }
@keyframes searchIn { from { opacity:0; transform: translateX(-50%) translateY(-10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
#search-input { width: 100%; padding: 10px 16px; border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; background: rgba(16,16,24,0.98); color: #fff; font-size: 0.9rem; outline: none; -webkit-appearance: none; }
#search-input::placeholder { color: #666; }
#search-results { max-height: 60vh; overflow-y: auto; background: rgba(16,16,24,0.98); border: 1px solid rgba(212,175,55,0.2); border-top: none; border-radius: 0 0 8px 8px; }
.search-result { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); transition: all 0.15s; display:flex; align-items:center; gap: 8px; font-size: 0.85rem; min-height: 44px; }
.search-result:hover, .search-result:active { background: rgba(212,175,55,0.08); }
.search-result .sr-icon { font-size: 1.1rem; }
.search-result .sr-type { margin-left: auto; font-size: 0.65rem; padding: 1px 6px; border-radius: 8px; background: rgba(255,255,255,0.05); color: #888; }

/* ─── FILTERS ─── */
#filters { position:fixed; bottom: 12px; left: 12px; z-index: 92; display:flex; gap: 5px; flex-wrap: wrap; max-width: 70%; }
.filter-btn { background: rgba(20,20,30,0.9); border: 1px solid rgba(255,255,255,0.08); color: #aaa; padding: 6px 10px; border-radius: 14px; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px); touch-action: manipulation; }
.filter-btn:hover, .filter-btn:active { border-color: rgba(212,175,55,0.3); color: #fff; }
.filter-btn.active { background: rgba(212,175,55,0.15); border-color: rgba(212,175,55,0.4); color: var(--oro); }

/* ─── LEGEND ─── */
#legend { position:fixed; bottom: 12px; right: 12px; z-index: 92; background: rgba(20,20,30,0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 8px 12px; backdrop-filter: blur(8px); font-size: 0.65rem; max-width: 140px; }
#legend .leg-row { display:flex; align-items:center; gap: 8px; margin-bottom: 3px; }
#legend .leg-row:last-child { margin-bottom: 0; }
#legend .leg-item { display:flex; align-items:center; gap: 3px; color: #aaa; }
#legend .leg-dot { width: 7px; height: 7px; border-radius: 50%; }
#legend .leg-line { width: 12px; height: 2px; }

/* ─── DETAIL PANEL (MOBILE BOTTOM SHEET) ─── */
#detail-panel { position:fixed; bottom: -100%; left:0; right:0; max-height: 70vh; background: rgba(16,16,24,0.98); border-top: 1px solid rgba(212,175,55,0.2); border-radius: 20px 20px 0 0; z-index:180; padding: 20px; backdrop-filter: blur(12px); transition: bottom 0.35s cubic-bezier(0.4,0,0.2,1); overflow-y:auto; }
#detail-panel.visible { bottom: 0; }
#detail-panel .detail-header { display:flex; align-items:center; gap: 10px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(212,175,55,0.15); }
#detail-panel .detail-icon { font-size: 1.8rem; }
#detail-panel .detail-title { font-size: 1.1rem; font-weight: bold; color: var(--oro); }
#detail-panel .detail-desc { font-size: 0.85rem; color: #aaa; line-height: 1.5; margin-bottom: 16px; }
#detail-panel .detail-meta { font-size: 0.78rem; color: #777; margin-bottom: 16px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; }
#detail-panel .detail-subtasks-title { font-size: 0.8rem; color: var(--oro); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
#detail-panel .detail-subtask { display:flex; align-items:flex-start; gap: 10px; padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; border-left: 3px solid; transition: all 0.2s ease; }
#detail-panel .detail-subtask.done { border-left-color: #4caf50; }
#detail-panel .detail-subtask.active { border-left-color: #2196f3; }
#detail-panel .detail-subtask.pending { border-left-color: #ff9800; }
#detail-panel .detail-subtask .dst-icon { font-size: 1.2rem; }
#detail-panel .detail-subtask .dst-content { flex: 1; }
#detail-panel .detail-subtask .dst-name { font-size: 0.88rem; color: #ddd; font-weight: 500; }
#detail-panel .detail-subtask .dst-human { font-size: 0.78rem; color: #aaa; line-height: 1.4; margin-top: 3px; }
#detail-panel .detail-subtask .dst-status { margin-left: auto; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; flex-shrink: 0; }
#detail-panel .close-btn { position:absolute; top: 10px; right: 14px; background:none; border:none; color:#888; font-size:1.4rem; cursor:pointer; padding:8px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; }
#detail-panel .close-btn:hover { color: var(--oro); }
#detail-panel .drag-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: -10px auto 10px; }

/* ─── TOOLTIP ─── */
.tooltip { position:fixed; padding: 12px; background: rgba(16,14,10,0.98); border: 1px solid var(--oro); border-radius: 10px; max-width: min(280px, 80vw); z-index:200; pointer-events:none; opacity:0; transition: opacity 0.25s; box-shadow: 0 8px 30px rgba(0,0,0,0.7); font-size: 0.8rem; }
.tooltip.visible { opacity:1; }
.tooltip .tt-title { font-size: 0.95rem; font-weight: bold; color: var(--oro); margin-bottom: 4px; }
.tooltip .tt-desc { font-size: 0.78rem; color: #ccc; line-height: 1.4; margin-bottom: 4px; }
.tooltip .tt-meta { font-size: 0.72rem; color: #888; }

/* ─── SERVER SECTIONS ─── */
.server-section { margin-bottom: 12px; border: 1px solid rgba(212,175,55,0.08); border-radius: 10px; overflow:hidden; transition: all 0.3s ease; }
.server-section-header { display:flex; align-items:center; gap: 8px; padding: 12px 14px; background: rgba(212,175,55,0.04); cursor: pointer; transition: all 0.3s ease; min-height: 48px; }
.server-section-header:active { background: rgba(212,175,55,0.08); }
.server-section-header .sh-icon { font-size: 1.3rem; }
.server-section-header .sh-name { font-weight: bold; color: #fff; font-size: 0.95rem; }
.server-section-header .sh-status { margin-left: auto; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; text-transform: uppercase; font-weight: bold; }
.server-section-header .sh-status.online { background: rgba(76,175,80,0.15); color: #4caf50; }
.server-section-header .sh-status.offline { background: rgba(244,67,54,0.15); color: #f44336; }
.server-section-header .sh-status.unknown { background: rgba(255,152,0,0.15); color: #ff9800; }
.server-section-header .sh-count { margin-left: 8px; font-size: 0.7rem; color: #888; }
.server-section-body { display: none; padding: 0 14px 12px; animation: fadeIn 0.3s ease; }
.server-section-body.visible { display: block; }
@keyframes fadeIn { from { opacity:0; transform: translateY(-5px); } to { opacity:1; transform: translateY(0); } }

.comp-card { background: rgba(25,25,35,0.8); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; margin-top: 8px; cursor: pointer; transition: all 0.2s ease; }
.comp-card:active { border-color: rgba(212,175,55,0.25); background: rgba(212,175,55,0.03); }
.comp-card.active { border-color: rgba(212,175,55,0.4); background: rgba(212,175,55,0.06); }
.comp-card .comp-header { display:flex; align-items:center; gap: 8px; }
.comp-card .comp-icon { font-size: 1.1rem; }
.comp-card .comp-name { font-weight: 600; font-size: 0.85rem; color: #ddd; }
.comp-card .comp-desc { font-size: 0.75rem; color: #999; line-height: 1.3; margin: 4px 0; padding-left: 26px; }
.comp-card .comp-meta { font-size: 0.68rem; color: #777; padding-left: 26px; display:flex; gap: 8px; flex-wrap: wrap; }
.comp-card .comp-progress { padding-left: 26px; margin-top: 4px; }
.comp-card .progress-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.comp-card .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.comp-card .expand-icon { margin-left: auto; font-size: 0.75rem; color: #888; }

.subtask { display:flex; align-items:flex-start; gap: 8px; padding: 6px 0; padding-left: 26px; border-left: 2px solid rgba(212,175,55,0.1); margin-left: 6px; }
.subtask .st-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }
.subtask .st-content { flex: 1; }
.subtask .st-name { font-size: 0.8rem; color: #ddd; }
.subtask .st-human { font-size: 0.72rem; color: #aaa; line-height: 1.3; margin-top: 2px; }
.subtask .st-status { font-size: 0.6rem; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; font-weight: 600; }
.subtask .st-status.done { background: rgba(76,175,80,0.12); color: #4caf50; }
.subtask .st-status.active { background: rgba(33,150,243,0.12); color: #2196f3; }
.subtask .st-status.pending { background: rgba(255,152,0,0.12); color: #ff9800; }

.channel-label { font-size: 9px; fill: rgba(212,175,55,0.5); text-anchor: middle; pointer-events: none; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.15); border-radius: 2px; }

/* ═══════════════════════════════════════
   RESPONSIVE: TABLET (≥768px)
   ═══════════════════════════════════════ */
@media (min-width: 768px) {
    .header .subtitle { display: block; max-width: 200px; }
    .header .stats .stat-item { display:flex; }
    .header .stats .stat-item.stat-done .stat-count { display:flex; }
    .header .last-update { display: block; font-size: 0.7rem; color: #666; margin-left: 10px; }
    .header .mobile-menu-btn { display: none; }
    
    #main { right: 340px; }
    #main.panel-open { right: 340px; }
    
    #side-panel { position:fixed; top:56px; right:0; width: 340px; height: calc(100vh - 56px); padding: 20px; box-shadow: none; border-left: 1px solid rgba(212,175,55,0.15); z-index:90; transition: none; }
    #side-panel.visible { right: 0; }
    #side-panel .drawer-close { display: none; }
    #side-panel .drawer-title { display: none; }
    #side-panel-overlay { display: none; }
    
    #detail-panel { position:fixed; top:56px; right:340px; width:300px; left:auto; bottom:auto; max-height: calc(100vh - 56px); border-radius: 0 0 0 16px; border-top: none; border-left: 1px solid rgba(212,175,55,0.2); z-index:85; transition: opacity 0.3s ease, transform 0.3s ease; opacity: 0; transform: translateX(20px); pointer-events: none; }
    #detail-panel.visible { bottom: auto; opacity: 1; transform: translateX(0); pointer-events: auto; }
    #detail-panel .drag-handle { display: none; }
    
    .server-section-header { padding: 14px 18px; }
    .comp-card { padding: 12px; }
    .comp-card .comp-name { font-size: 0.9rem; }
    .comp-card .comp-desc { font-size: 0.78rem; padding-left: 30px; }
    .comp-card .comp-meta { font-size: 0.72rem; padding-left: 30px; }
    .comp-card .comp-progress { padding-left: 30px; }
    
    #filters { bottom: 16px; left: 16px; }
    .filter-btn { padding: 6px 12px; font-size: 0.72rem; }
    
    #legend { bottom: 16px; right: 360px; font-size: 0.7rem; max-width: none; padding: 10px 14px; }
}

/* ═══════════════════════════════════════
   RESPONSIVE: DESKTOP (≥1200px)
   ═══════════════════════════════════════ */
@media (min-width: 1200px) {
    #main { right: 400px; }
    #side-panel { width: 400px; }
    #detail-panel { width: 340px; right: 400px; }
    #legend { right: 420px; }
    .header .stat-item { display:flex !important; }
}

/* ═══════════════════════════════════════
   RESPONSIVE: SMALL MOBILE (<380px)
   ═══════════════════════════════════════ */
@media (max-width: 380px) {
    .header { padding: 0 10px; height: 50px; }
    .header .logo { font-size: 1rem; letter-spacing: 1px; }
    .header .subtitle { display: none; }
    #main { top: 50px; }
    .filter-btn { padding: 5px 8px; font-size: 0.65rem; }
    #legend { display: none; } /* Ocultar leyenda en pantallas muy pequeñas */
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">🏰 LA CATEDRAL</div>
    <div class="subtitle">Mapa vivo del ecosistema Hermes .95</div>
    <div class="stats">
        <span class="stat-item stat-done"><span class="stat-count">✅ 27</span></span>
        <span class="stat-item stat-active"><span class="stat-count">🔄 15</span></span>
        <span class="stat-item stat-pending"><span class="stat-count">⏳ 6</span></span>
        <span class="stat-item"><span class="stat-count">📋 48</span></span>
    </div>
    <button class="export-btn" onclick="exportJSON()">📥 JSON</button>
    <div class="status-dot"></div>
    <button class="mobile-menu-btn" onclick="toggleDrawer()" aria-label="Menu">☰</button>
</div>

<!-- OVERLAY PARA DRAWER -->
<div id="side-panel-overlay" onclick="toggleDrawer()"></div>

<!-- BUSCADOR -->
<div id="search-box">
    <input type="text" id="search-input" placeholder="Buscar... (Ctrl+K)" autocomplete="off">
    <div id="search-results"></div>
</div>

<div id="main">
    <svg id="bg-svg" viewBox="0 0 1400 800" preserveAspectRatio="xMidYMid slice">
        <defs>
            <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a28"/><stop offset="100%" stop-color="#0a0a10"/></linearGradient>
            <radialGradient id="glowCenter" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="rgba(212,175,55,0.06)"/><stop offset="100%" stop-color="transparent"/></radialGradient>
        </defs>
        <polygon points="0,800 1400,800 1000,600 400,600" fill="url(#floorGrad)" opacity="0.5"/>
        <rect width="1400" height="800" fill="url(#glowCenter)" pointer-events="none"/>
        <g fill="#1a1a22"><rect x="50" y="0" width="70" height="800" rx="2"/><rect x="1280" y="0" width="70" height="800" rx="2"/></g>
        <g stroke="rgba(212,175,55,0.06)" stroke-width="1.5" fill="none">
            <path d="M 120 0 Q 700 350 1280 0"/>
            <path d="M 120 0 L 1280 800 M 1280 0 L 120 800"/>
        </g>
    </svg>
    <svg id="grafo"></svg>
</div>

<!-- FILTROS -->
<div id="filters">
    <button class="filter-btn active" data-filter="all" onclick="applyFilter('all')">📋 Todo</button>
    <button class="filter-btn" data-filter="active" onclick="applyFilter('active')">🔄 Activos</button>
    <button class="filter-btn" data-filter="pending" onclick="applyFilter('pending')">⏳ Pendientes</button>
    <button class="filter-btn" data-filter="done" onclick="applyFilter('done')">✅ Completados</button>
</div>

<!-- LEYENDA -->
<div id="legend">
    <div class="leg-row">
        <span class="leg-item"><span class="leg-dot" style="background:#4caf52;"></span>Online</span>
        <span class="leg-item"><span class="leg-dot" style="background:#ff9800;"></span>Desc</span>
        <span class="leg-item"><span class="leg-dot" style="background:#f44336;"></span>Off</span>
    </div>
    <div class="leg-row">
        <span class="leg-item"><span class="leg-line" style="background:#d4af37;"></span>Canal</span>
        <span class="leg-item"><span class="leg-line" style="border-top:1px dashed rgba(212,175,55,0.3);background:transparent;height:0;"></span>Int</span>
    </div>
</div>

<!-- SIDE PANEL (MOBILE DRAWER / DESKTOP SIDEBAR) -->
<div id="side-panel">
    <button class="drawer-close" onclick="toggleDrawer()">✕</button>
    <div class="drawer-title">Componentes</div>
    <div id="server-sections"></div>
</div>

<!-- DETAIL PANEL (MOBILE BOTTOM SHEET / DESKTOP FLYOUT) -->
<div id="detail-panel">
    <div class="drag-handle"></div>
    <button class="close-btn" onclick="closeDetailPanel()">✕</button>
    <div id="detail-content"></div>
</div>

    .attr('fill', d => d.status === 'online' ? 'rgba(76,175,80,0.06)' : 'rgba(244,67,54,0.06)')
    .attr('stroke', d => d.color)
    .attr('stroke-width', d => d.isCenter ? 3 : 2.5)
    .attr('stroke-opacity', 0.6)
    .attr('stroke-dasharray', d => d.status === 'online' ? 'none' : '8,4');

serverGroup.append('circle')
    .attr('r', srvInnerRadius)
    .attr('fill', 'rgba(10,10,15,0.9)')
    .attr('stroke', d => d.color)
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.3);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? (isMobile() ? -10 : -14) : (isMobile() ? -8 : -10))
    .attr('font-size', d => d.isCenter ? (isMobile() ? '1.6rem' : '2.2rem') : (isMobile() ? '1.3rem' : '1.7rem'))
    .text(d => d.icon);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? (isMobile() ? 16 : 20) : (isMobile() ? 12 : 16))
    .attr('fill', '#fff').attr('font-size', d => d.isCenter ? (isMobile() ? '11px' : '14px') : (isMobile() ? '9px' : '12px'))
    .attr('font-weight', 'bold').attr('letter-spacing', '1px')
    .text(d => d.name);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? (isMobile() ? 30 : 38) : (isMobile() ? 24 : 30))
    .attr('fill', d => d.status === 'online' ? '#4caf50' : '#f44336')
    .attr('font-size', '10px')
    .text(d => d.status);

serverGroup.transition().duration(800).delay((d, i) => i * 150).style('opacity', 1);

// === HIGHLIGHT ===
function highlightNode(nodeId) {
    const connected = getConnectedNodes(nodeId);
    const connectedFlows = getConnectedFlows(nodeId);
    d3.selectAll('.server-node, .comp-node').transition().duration(400)
        .style('opacity', d => connected.has(d.id) ? 1 : 0.15);
    linkElements.forEach(({line, compId, srvId}) => {
        const isConnected = connected.has(compId) || connected.has(srvId);
        line.transition().duration(400)
            .attr('stroke-opacity', isConnected ? 0.6 : 0.05)
            .attr('stroke-width', isConnected ? 2 : 1);
    });
    Object.keys(flowElements).forEach(fid => {
        const isConnected = connectedFlows.includes(fid);
        const el = flowElements[fid];
        el.path.transition().duration(400)
            .attr('stroke-opacity', isConnected ? 0.8 : 0.05)
            .attr('stroke-width', isConnected ? 3 : 1);
        el.label.transition().duration(400)
            .style('opacity', isConnected ? 1 : 0.1);
        el.particle.transition().duration(400)
            .style('opacity', isConnected ? 1 : 0.1);
    });
}

function resetHighlight() {
    d3.selectAll('.server-node, .comp-node').transition().duration(500)
        .style('opacity', 1);
    linkElements.forEach(({line}) => {
        line.transition().duration(500)
            .attr('stroke-opacity', 0.06)
            .attr('stroke-width', 1);
    });
    Object.keys(flowElements).forEach(fid => {
        const el = flowElements[fid];
        el.path.transition().duration(500)
            .attr('stroke-opacity', 0.1)
            .attr('stroke-width', 2);
        el.label.transition().duration(500)
            .style('opacity', 1);
    });
}

function zoomToNode(node, scale) {
    svg.transition().duration(800).ease(d3.easeCubicInOut).call(zoom.transform,
        d3.zoomIdentity.translate(width/2 - node.x*scale, height/2 - node.y*scale).scale(scale));
}

function zoomToFit() {
    const allNodes = [...servers, ...components];
    const minX = Math.min(...allNodes.map(n => n.x)) - 100;
    const maxX = Math.max(...allNodes.map(n => n.x)) + 100;
    const minY = Math.min(...allNodes.map(n => n.y)) - 100;
    const maxY = Math.max(...allNodes.map(n => n.y)) + 100;
    const dx = maxX - minX;
    const dy = maxY - minY;
    const scale = Math.min(width / dx, height / dy, 1) * 0.9;
    const tx = (width - dx * scale) / 2 - minX * scale;
    const ty = (height - dy * scale) / 2 - minY * scale;
    svg.transition().duration(1000).ease(d3.easeCubicInOut).call(zoom.transform,
        d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// === INTERACCIONES SERVIDOR ===
serverGroup.on('touchstart mouseover', function(event, d) {
    d3.select(this).select('circle').transition().duration(200)
        .attr('stroke-width', d.isCenter ? 5 : 4).attr('stroke-opacity', 1);
    tooltip.html(`
        <div class="tt-title">${d.icon} ${d.name}</div>
        <div class="tt-desc">${d.desc}</div>
        <div class="tt-meta">IP: ${d.ip} | Estado: ${d.status}</div>
    `).classed('visible', true)
    .style('left', Math.min((event.pageX || event.touches[0].pageX) + 12, window.innerWidth - 300) + 'px')
    .style('top', Math.min((event.pageY || event.touches[0].pageY) + 12, window.innerHeight - 150) + 'px');
})
.on('mouseout', function(event, d) {
    if (!selectedServerId || selectedServerId !== d.id) {
        d3.select(this).select('circle').transition().duration(200)
            .attr('stroke-width', d.isCenter ? 3 : 2.5).attr('stroke-opacity', 0.6);
    }
    tooltip.classed('visible', false);
})
.on('click', function(event, d) {
    event.stopPropagation();
    selectedCompId = null;
    selectedServerId = d.id;
    closeDetailPanel();
    highlightNode(d.id);
    const scale = d.isCenter ? (isMobile() ? 1.1 : 1.3) : (isMobile() ? 1.4 : 1.8);
    zoomToNode(d, scale);
    highlightServer(d.id);
});

// === INTERACCIONES COMPONENTE ===
compGroup.on('touchstart mouseover', function(event, d) {
    d3.select(this).select('circle').transition().duration(200)
        .attr('stroke-width', 3).attr('stroke-opacity', 0.9).attr('r', compRadius + 4);
    const subtasksPreview = d.subtasks.slice(0, 3).map(st => 
        `<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:0.72rem;color:#ccc;">
            <span>${st.icon}</span><span>${st.name}</span><span style="margin-left:auto;font-size:0.6rem;" class="st-${st.status}">${st.status}</span>
        </div>`
    ).join('');
    const more = d.subtasks.length > 3 ? `<div style="font-size:0.68rem;color:#888;margin-top:4px;">+${d.subtasks.length - 3} mas...</div>` : '';
    tooltip.html(`
        <div class="tt-title">${d.icon} ${d.name}</div>
        <div class="tt-desc">${d.human_desc}</div>
        <div style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(212,175,55,0.15);">
            <div style="font-size:0.68rem;color:var(--oro);margin-bottom:3px;">Subtareas (${d.progress}%):</div>
            ${subtasksPreview}${more}
        </div>
    `).classed('visible', true)
    .style('left', Math.min((event.pageX || event.touches[0].pageX) + 12, window.innerWidth - 300) + 'px')
    .style('top', Math.min((event.pageY || event.touches[0].pageY) + 12, window.innerHeight - 200) + 'px');
})
.on('mouseout', function(event, d) {
    if (!selectedCompId || selectedCompId !== d.id) {
        d3.select(this).select('circle').transition().duration(200)
            .attr('stroke-width', 2).attr('stroke-opacity', 0.5).attr('r', compRadius);
    }
    tooltip.classed('visible', false);
})
.on('click', function(event, d) {
    event.stopPropagation();
    selectedCompId = d.id;
    selectedServerId = null;
    showComponentDetail(d);
    highlightNode(d.id);
    zoomToNode(d, isMobile() ? 2 : 2.5);
});

// === CLICK EN FONDO ===
svg.on('click', function(event) {
    if (event.target.tagName === 'svg') {
        selectedCompId = null; selectedServerId = null;
        closeDetailPanel(); resetHighlight(); zoomToFit();
    }
});

// === BUSCADOR ===
const searchBox = document.getElementById('search-box');
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

let searchIndex = [];
DATA.servers.forEach(s => searchIndex.push({ type: 'servidor', id: s.id, name: s.name, icon: s.icon, desc: s.desc }));
DATA.components.forEach(c => {
    searchIndex.push({ type: 'componente', id: c.id, name: c.name, icon: c.icon, desc: c.human_desc, server: c.server });
    c.subtasks.forEach((st, i) => searchIndex.push({ type: 'subtarea', id: c.id + '-sub-' + i, name: st.name, icon: st.icon, desc: st.human_summary, parent: c.name }));
});

function openSearch() { searchBox.classList.add('visible'); searchInput.focus(); searchInput.value = ''; searchResults.innerHTML = ''; }
function closeSearch() { searchBox.classList.remove('visible'); searchResults.innerHTML = ''; }
function doSearch(query) {
    if (!query || query.length < 2) { searchResults.innerHTML = ''; return; }
    const q = query.toLowerCase();
    const results = searchIndex.filter(item => item.name.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q)).slice(0, 10);
    searchResults.innerHTML = results.map(r => {
        const typeLabel = { 'servidor': 'Srv', 'componente': 'Comp', 'subtarea': 'Sub' }[r.type];
        return `
            <div class="search-result" onclick="goToSearchResult('${r.type}', '${r.id}')">
                <span class="sr-icon">${r.icon}</span>
                <span>${r.name}</span>
                ${r.parent ? `<span style="color:#888;font-size:0.65rem;">(${r.parent})</span>` : ''}
                <span class="sr-type">${typeLabel}</span>
            </div>`;
    }).join('') || '<div style="padding:10px;color:#888;font-size:0.8rem;">Sin resultados</div>';
}
function goToSearchResult(type, id) {
    closeSearch();
    if (type === 'servidor') {
        const srv = servers.find(s => s.id === id);
        if (srv) { selectedServerId = id; selectedCompId = null; closeDetailPanel(); highlightNode(id); zoomToNode(srv, srv.isCenter ? 1.3 : 1.8); highlightServer(id); }
    } else if (type === 'componente') {
        const comp = components.find(c => c.id === id);
        if (comp) { selectedCompId = id; selectedServerId = null; showComponentDetail(comp); highlightNode(id); zoomToNode(comp, 2.5); }
    } else if (type === 'subtarea') {
        const compId = id.split('-sub-')[0];
        const comp = components.find(c => c.id === compId);
        if (comp) { selectedCompId = compId; selectedServerId = null; showComponentDetail(comp); highlightNode(compId); zoomToNode(comp, 2.5); }
    }
}
searchInput.addEventListener('input', (e) => doSearch(e.target.value));
searchInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSearch(); });
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
    if (e.key === 'Escape') { closeSearch(); selectedCompId = null; selectedServerId = null; closeDetailPanel(); resetHighlight(); zoomToFit(); }
});
window.openSearch = openSearch; window.closeSearch = closeSearch; window.goToSearchResult = goToSearchResult;

// === DETAIL PANEL ===
function showComponentDetail(comp) {
    selectedCompId = comp.id;
    const panel = document.getElementById('detail-panel');
    const content = document.getElementById('detail-content');
    const subtasksHtml = comp.subtasks.map(st => {
        const color = st.status === 'done' ? '#4caf50' : st.status === 'active' ? '#2196f3' : '#ff9800';
        return `
            <div class="detail-subtask ${st.status}">
                <span class="dst-icon">${st.icon}</span>
                <div class="dst-content">
                    <div class="dst-name">${st.name}</div>
                    <div class="dst-human">${st.human_summary}</div>
                </div>
                <span class="dst-status" style="background: ${color}20; color: ${color};">${st.status}</span>
            </div>`;
    }).join('');
    content.innerHTML = `
        <div class="detail-header">
            <span class="detail-icon">${comp.icon}</span>
            <span class="detail-title">${comp.name}</span>
        </div>
        <div class="detail-desc">${comp.human_desc}</div>
        <div class="detail-meta">
            <div>🖥️ ${comp.parentServer.name}</div>
            <div>⏱️ ${comp.schedule}</div>
            <div>🕐 ${comp.last_run}</div>
            <div>📊 ${comp.progress}%</div>
        </div>
        <div class="detail-subtasks-title">Subtareas (${comp.subtasks.length})</div>
        ${subtasksHtml}
    `;
    panel.classList.add('visible');
    if (isMobile()) {
        // En mobile, cerrar drawer si esta abierto para no tapar el bottom sheet
        if (drawerOpen) toggleDrawer();
    }
}
function closeDetailPanel() { document.getElementById('detail-panel').classList.remove('visible'); }
window.closeDetailPanel = closeDetailPanel;

// === EXPORT JSON ===
function exportJSON() {
    const exportData = { ...DATA, export_info: { exported_at: new Date().toISOString(), version: DATA.meta.version, stats: STATS } };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `la_catedral_estado_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
window.exportJSON = exportJSON;

// === PANEL LATERAL ===
function renderPanel() {
    const container = document.getElementById('server-sections');
    container.innerHTML = DATA.servers.map(srv => {
        const srvComps = DATA.components.filter(c => c.server === srv.id);
        const compCount = srvComps.length;
        const subtaskCount = srvComps.reduce((sum, c) => sum + (c.subtasks ? c.subtasks.length : 0), 0);
        return `
            <div class="server-section" id="section-${srv.id}">
                <div class="server-section-header" onclick="toggleSection('${srv.id}')">
                    <span class="sh-icon">${srv.icon}</span>
                    <span class="sh-name">${srv.name}</span>
                    <span class="sh-count">${compCount} · ${subtaskCount}</span>
                    <span class="sh-status ${srv.status}">${srv.status}</span>
                </div>
                <div class="server-section-body ${srv.id === 'srv-95' ? 'visible' : ''}" id="section-body-${srv.id}">
                    <div style="font-size:0.75rem;color:#999;margin:8px 0;line-height:1.3;">${srv.desc}</div>
                    ${srvComps.map(c => {
                        const done = c.subtasks.filter(s => s.status === 'done').length;
                        const progress = Math.round((done / c.subtasks.length) * 100);
                        const progColor = done === c.subtasks.length ? '#4caf50' : done > 0 ? '#d4af37' : '#888';
                        return `
                        <div class="comp-card ${selectedCompId === c.id ? 'active' : ''}" id="comp-${c.id}" onclick="event.stopPropagation(); selectComponent('${c.id}')">
                            <div class="comp-header">
                                <span class="comp-icon">${c.icon}</span>
                                <span class="comp-name">${c.name}</span>
                            </div>
                            <div class="comp-desc">${c.human_desc}</div>
                            <div class="comp-meta"><span>⏱ ${c.schedule}</span><span>📋 ${c.subtasks.length}</span></div>
                            <div class="comp-progress">
                                <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%; background: ${progColor};"></div></div>
                            </div>
                        </div>`;
                    }).join('')}
                    ${compCount === 0 ? '<div style="font-size:0.75rem;color:#666;padding:8px;">Sin componentes</div>' : ''}
                </div>
            </div>`;
    }).join('');
}

function toggleSection(srvId) {
    const body = document.getElementById('section-body-' + srvId);
    if (body) body.classList.toggle('visible');
}

function selectComponent(compId) {
    const comp = DATA.components.find(c => c.id === compId);
    if (comp) {
        selectedCompId = compId; selectedServerId = null;
        showComponentDetail(comp); highlightNode(compId); zoomToNode(comp, isMobile() ? 2 : 2.5);
        renderPanel();
    }
}

function highlightServer(srvId) {
    document.querySelectorAll('.server-section').forEach(el => el.style.borderColor = '');
    const section = document.getElementById('section-' + srvId);
    if (section) {
        section.style.borderColor = 'rgba(212,175,55,0.3)';
        document.getElementById('section-body-' + srvId).classList.add('visible');
    }
}

window.toggleSection = toggleSection;
window.selectComponent = selectComponent;
window.highlightServer = highlightServer;
window.closeDetailPanel = closeDetailPanel;

renderPanel();

// === RESIZE HANDLER ===
let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => location.reload(), 500);
});

// Zoom inicial
setTimeout(() => zoomToFit(), 500);

// Auto-refresh cada 5 minutos
setInterval(() => location.reload(), 300000);
</script>
</body>
