    .attr('fill', '#fff').attr('font-size', d => d.isCenter ? '14px' : '12px')
    .attr('font-weight', 'bold').attr('letter-spacing', '1px')
    .text(d => d.name);

serverGroup.append('text')
    .attr('text-anchor', 'middle').attr('dy', d => d.isCenter ? 38 : 30)
    .attr('fill', d => d.status === 'online' ? '#4caf50' : '#f44336')
    .attr('font-size', '10px')
    .text(d => d.status);

serverGroup.transition().duration(800).delay((d, i) => i * 150).style('opacity', 1);

// === HIGHLIGHT ===
function highlightNode(nodeId) {
    const connected = getConnectedNodes(nodeId);
    const connectedFlows = getConnectedFlows(nodeId);
    
    d3.selectAll('.server-node, .comp-node').transition().duration(400)
        .style('opacity', d => connected.has(d.id) ? 1 : 0.15);
    
    linkElements.forEach(({line, compId, srvId}) => {
        const isConnected = connected.has(compId) || connected.has(srvId);
        line.transition().duration(400)
            .attr('stroke-opacity', isConnected ? 0.6 : 0.05)
            .attr('stroke-width', isConnected ? 2 : 1);
    });
    
    Object.keys(flowElements).forEach(fid => {
        const isConnected = connectedFlows.includes(fid);
        const el = flowElements[fid];
        el.path.transition().duration(400)
            .attr('stroke-opacity', isConnected ? 0.8 : 0.05)
            .attr('stroke-width', isConnected ? 3 : 1);
        el.label.transition().duration(400)
            .style('opacity', isConnected ? 1 : 0.1);
        el.particle.transition().duration(400)
            .style('opacity', isConnected ? 1 : 0.1);
    });
}

function resetHighlight() {
    d3.selectAll('.server-node, .comp-node').transition().duration(500)
        .style('opacity', 1);
    
    linkElements.forEach(({line}) => {
        line.transition().duration(500)
            .attr('stroke-opacity', 0.06)
            .attr('stroke-width', 1);
    });
    
    Object.keys(flowElements).forEach(fid => {
        const el = flowElements[fid];
        el.path.transition().duration(500)
            .attr('stroke-opacity', 0.1)
            .attr('stroke-width', 2);
        el.label.transition().duration(500)
            .style('opacity', 1);
    });
}

function zoomToNode(node, scale) {
    svg.transition().duration(800).ease(d3.easeCubicInOut).call(zoom.transform,
        d3.zoomIdentity.translate(width/2 - node.x*scale, height/2 - node.y*scale).scale(scale));
}

function zoomToFit() {
    const allNodes = [...servers, ...components];
    const minX = Math.min(...allNodes.map(n => n.x)) - 100;
    const maxX = Math.max(...allNodes.map(n => n.x)) + 100;
    const minY = Math.min(...allNodes.map(n => n.y)) - 100;
    const maxY = Math.max(...allNodes.map(n => n.y)) + 100;
    const dx = maxX - minX;
    const dy = maxY - minY;
    const scale = Math.min(width / dx, height / dy, 1) * 0.9;
    const tx = (width - dx * scale) / 2 - minX * scale;
    const ty = (height - dy * scale) / 2 - minY * scale;
    
    svg.transition().duration(1000).ease(d3.easeCubicInOut).call(zoom.transform,
        d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// === INTERACCIONES SERVIDOR ===
serverGroup.on('mouseover', function(event, d) {
    d3.select(this).select('circle').transition().duration(200)
        .attr('stroke-width', d.isCenter ? 5 : 4).attr('stroke-opacity', 1);
    tooltip.html(`
        <div class="tt-title">${d.icon} ${d.name}</div>
        <div class="tt-desc">${d.desc}</div>
        <div class="tt-meta">IP: ${d.ip} | Estado: ${d.status} | Click para ver conexiones</div>
    `).classed('visible', true)
    .style('left', Math.min(event.pageX + 16, window.innerWidth - 360) + 'px')
    .style('top', Math.min(event.pageY + 16, window.innerHeight - 150) + 'px');
})
.on('mouseout', function(event, d) {
    if (!selectedServerId || selectedServerId !== d.id) {
        d3.select(this).select('circle').transition().duration(200)
            .attr('stroke-width', d.isCenter ? 3 : 2.5).attr('stroke-opacity', 0.6);
    }
    tooltip.classed('visible', false);
})
.on('click', function(event, d) {
    event.stopPropagation();
    selectedCompId = null;
    selectedServerId = d.id;
    closeDetailPanel();
    highlightNode(d.id);
    const scale = d.isCenter ? 1.3 : 1.8;
    zoomToNode(d, scale);
    highlightServer(d.id);
});

// === INTERACCIONES COMPONENTE ===
compGroup.on('mouseover', function(event, d) {
    d3.select(this).select('circle').transition().duration(200)
        .attr('stroke-width', 3).attr('stroke-opacity', 0.9).attr('r', 32);
    
    const subtasksPreview = d.subtasks.slice(0, 3).map(st => 
        `<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:0.75rem;color:#ccc;">
            <span>${st.icon}</span><span>${st.name}</span><span style="margin-left:auto;font-size:0.65rem;" class="st-${st.status}">${st.status}</span>
        </div>`
    ).join('');
    const more = d.subtasks.length > 3 ? `<div style="font-size:0.7rem;color:#888;margin-top:4px;">+${d.subtasks.length - 3} mas... (click para ver resumen)</div>` : '';
    
    tooltip.html(`
        <div class="tt-title">${d.icon} ${d.name}</div>
        <div class="tt-desc">${d.human_desc}</div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(212,175,55,0.15);">
            <div style="font-size:0.7rem;color:var(--oro);margin-bottom:4px;">Subtareas (${d.progress}%):</div>
            ${subtasksPreview}${more}
        </div>
        <div class="tt-meta" style="margin-top:6px;">Click para centrar y ver conexiones</div>
    `).classed('visible', true)
    .style('left', Math.min(event.pageX + 16, window.innerWidth - 360) + 'px')
    .style('top', Math.min(event.pageY + 16, window.innerHeight - 250) + 'px');
})
.on('mouseout', function(event, d) {
    if (!selectedCompId || selectedCompId !== d.id) {
        d3.select(this).select('circle').transition().duration(200)
            .attr('stroke-width', 2).attr('stroke-opacity', 0.5).attr('r', 28);
    }
    tooltip.classed('visible', false);
})
.on('click', function(event, d) {
    event.stopPropagation();
    selectedCompId = d.id;
    selectedServerId = null;
    showComponentDetail(d);
    highlightNode(d.id);
    zoomToNode(d, 2.5);
});

// === CLICK EN FONDO ===
svg.on('click', function(event) {
    if (event.target.tagName === 'svg') {
        selectedCompId = null;
        selectedServerId = null;
        closeDetailPanel();
        resetHighlight();
        zoomToFit();
    }
});

// === BUSCADOR ===
const searchBox = document.getElementById('search-box');
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

let searchIndex = [];
// Construir indice de busqueda
DATA.servers.forEach(s => {
    searchIndex.push({ type: 'servidor', id: s.id, name: s.name, icon: s.icon, desc: s.desc });
});
DATA.components.forEach(c => {
    searchIndex.push({ type: 'componente', id: c.id, name: c.name, icon: c.icon, desc: c.human_desc, server: c.server });
    c.subtasks.forEach((st, i) => {
        searchIndex.push({ type: 'subtarea', id: c.id + '-sub-' + i, name: st.name, icon: st.icon, desc: st.human_summary, parent: c.name });
    });
});

function openSearch() {
    searchBox.classList.add('visible');
    searchInput.focus();
    searchInput.value = '';
    searchResults.innerHTML = '';
}

function closeSearch() {
    searchBox.classList.remove('visible');
    searchResults.innerHTML = '';
}

function doSearch(query) {
    if (!query || query.length < 2) {
        searchResults.innerHTML = '';
        return;
    }
    const q = query.toLowerCase();
    const results = searchIndex.filter(item => 
        item.name.toLowerCase().includes(q) || 
        item.desc.toLowerCase().includes(q)
    ).slice(0, 10);
    
    searchResults.innerHTML = results.map(r => {
        const typeLabel = { 'servidor': 'Servidor', 'componente': 'Componente', 'subtarea': 'Subtarea' }[r.type];
        return `
            <div class="search-result" onclick="goToSearchResult('${r.type}', '${r.id}')">
                <span class="sr-icon">${r.icon}</span>
                <span>${r.name}</span>
                ${r.parent ? `<span style="color:#888;font-size:0.7rem;">(${r.parent})</span>` : ''}
                <span class="sr-type">${typeLabel}</span>
            </div>
        `;
    }).join('') || '<div style="padding:10px;color:#888;font-size:0.8rem;">Sin resultados</div>';
}

function goToSearchResult(type, id) {
    closeSearch();
    if (type === 'servidor') {
        const srv = servers.find(s => s.id === id);
        if (srv) {
            selectedServerId = id;
            selectedCompId = null;
            closeDetailPanel();
            highlightNode(id);
            zoomToNode(srv, srv.isCenter ? 1.3 : 1.8);
            highlightServer(id);
        }
    } else if (type === 'componente') {
        const comp = components.find(c => c.id === id);
        if (comp) {
            selectedCompId = id;
            selectedServerId = null;
            showComponentDetail(comp);
            highlightNode(id);
            zoomToNode(comp, 2.5);
        }
    } else if (type === 'subtarea') {
        const compId = id.split('-sub-')[0];
        const comp = components.find(c => c.id === compId);
        if (comp) {
            selectedCompId = compId;
            selectedServerId = null;
            showComponentDetail(comp);
            highlightNode(compId);
            zoomToNode(comp, 2.5);
        }
    }
}

searchInput.addEventListener('input', (e) => doSearch(e.target.value));
searchInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSearch(); });

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        openSearch();
    }
    if (e.key === 'Escape') {
        closeSearch();
        selectedCompId = null;
        selectedServerId = null;
        closeDetailPanel();
        resetHighlight();
        zoomToFit();
    }
});

window.openSearch = openSearch;
window.closeSearch = closeSearch;
window.goToSearchResult = goToSearchResult;

// === DETAIL PANEL ===
function showComponentDetail(comp) {
    selectedCompId = comp.id;
    const panel = document.getElementById('detail-panel');
    const content = document.getElementById('detail-content');
    
    const subtasksHtml = comp.subtasks.map(st => {
        const color = st.status === 'done' ? '#4caf50' : st.status === 'active' ? '#2196f3' : '#ff9800';
        return `
            <div class="detail-subtask ${st.status}">
                <span class="dst-icon">${st.icon}</span>
                <div class="dst-content">
                    <div class="dst-name">${st.name}</div>
                    <div class="dst-human">${st.human_summary}</div>
                </div>
                <span class="dst-status" style="background: ${color}20; color: ${color};">${st.status}</span>
            </div>
        `;
    }).join('');
    
    content.innerHTML = `
        <div class="detail-header">
            <span class="detail-icon">${comp.icon}</span>
            <span class="detail-title">${comp.name}</span>
        </div>
        <div class="detail-desc">${comp.human_desc}</div>
        <div class="detail-meta">
            <div>🖥️ Servidor: ${comp.parentServer.name}</div>
            <div>⏱️ Schedule: ${comp.schedule}</div>
            <div>🕐 Ultima: ${comp.last_run}</div>
            <div>📊 Progreso: ${comp.progress}%</div>
        </div>
        <div class="detail-subtasks-title">Subtareas (${comp.subtasks.length})</div>
        ${subtasksHtml}
    `;
    
    panel.classList.add('visible');
}

function closeDetailPanel() {
    document.getElementById('detail-panel').classList.remove('visible');
}

window.closeDetailPanel = closeDetailPanel;

// === EXPORT JSON ===
function exportJSON() {
    const exportData = {
        ...DATA,
        export_info: {
            exported_at: new Date().toISOString(),
            version: DATA.meta.version,
            stats: STATS
        }
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `la_catedral_estado_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

window.exportJSON = exportJSON;

// === PANEL LATERAL ===
function renderPanel() {
    const container = document.getElementById('server-sections');
    container.innerHTML = DATA.servers.map(srv => {
        const srvComps = DATA.components.filter(c => c.server === srv.id);
        const compCount = srvComps.length;
        const subtaskCount = srvComps.reduce((sum, c) => sum + (c.subtasks ? c.subtasks.length : 0), 0);
        
        return `
            <div class="server-section" id="section-${srv.id}">
                <div class="server-section-header" onclick="toggleSection('${srv.id}')">
                    <span class="sh-icon">${srv.icon}</span>
                    <span class="sh-name">${srv.name}</span>
                    <span class="sh-count">${compCount} comp · ${subtaskCount} subs</span>
                    <span class="sh-status ${srv.status}">${srv.status}</span>
                </div>
                <div class="server-section-body ${srv.id === 'srv-95' ? 'visible' : ''}" id="section-body-${srv.id}">
                    <div style="font-size:0.78rem;color:#999;margin:10px 0;line-height:1.4;">${srv.desc}</div>
                    ${srvComps.map(c => {
                        const done = c.subtasks.filter(s => s.status === 'done').length;
                        const progress = Math.round((done / c.subtasks.length) * 100);
                        const progColor = done === c.subtasks.length ? '#4caf50' : done > 0 ? '#d4af37' : '#888';
                        return `
                        <div class="comp-card ${selectedCompId === c.id ? 'active' : ''}" id="comp-${c.id}" onclick="event.stopPropagation(); selectComponent('${c.id}')">
                            <div class="comp-header">
                                <span class="comp-icon">${c.icon}</span>
                                <span class="comp-name">${c.name}</span>
                                <span class="expand-icon">▶</span>
                            </div>
                            <div class="comp-desc">${c.human_desc}</div>
                            <div class="comp-meta">
                                <span>⏱ ${c.schedule}</span>
                                <span>🕐 ${c.last_run}</span>
                                <span>📋 ${c.subtasks.length} subtareas</span>
                            </div>
                            <div class="comp-progress">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progress}%; background: ${progColor};"></div>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                    ${compCount === 0 ? '<div style="font-size:0.78rem;color:#666;padding:10px;">Sin componentes activos</div>' : ''}
                </div>
            </div>
        `;
    }).join('');
}

function toggleSection(srvId) {
    const body = document.getElementById('section-body-' + srvId);
    if (body) body.classList.toggle('visible');
}

function selectComponent(compId) {
    const comp = DATA.components.find(c => c.id === compId);
    if (comp) {
        selectedCompId = compId;
        selectedServerId = null;
        showComponentDetail(comp);
        highlightNode(compId);
        zoomToNode(comp, 2.5);
        renderPanel();
    }
}

function highlightServer(srvId) {
    document.querySelectorAll('.server-section').forEach(el => el.style.borderColor = '');
    const section = document.getElementById('section-' + srvId);
    if (section) {
        section.style.borderColor = 'rgba(212,175,55,0.3)';
        document.getElementById('section-body-' + srvId).classList.add('visible');
    }
}

window.toggleSection = toggleSection;
window.selectComponent = selectComponent;
window.highlightServer = highlightServer;
window.closeDetailPanel = closeDetailPanel;

renderPanel();

// === PING CADA 50s (SIMULADO EN BROWSER) ===
function pingServer(ip, callback) {
    const start = Date.now();
    const img = new Image();
    img.onload = () => callback(Date.now() - start < 2000 ? 'online' : 'unknown');
    img.onerror = () => callback('offline');
    img.src = `http://${ip}:80/favicon.ico?${start}`;
    setTimeout(() => { if (!img.complete) { img.src = ''; callback('unknown'); } }, 2000);
}

function updateServerStatuses() {
    DATA.servers.forEach(srv => {
        if (srv.id === 'srv-95') return; // Siempre online
        // Simulacion: en produccion reemplazar con ping real
        // pingServer(srv.ip, (status) => { ... });
        
        // Por ahora solo actualizamos el timestamp
        const statusEl = document.querySelector(`.server-node-${srv.id} text:last-child`);
        if (statusEl) {
            statusEl.textContent = srv.status + ' · ' + new Date().toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
        }
    });
    document.querySelector('.last-update').textContent = new Date().toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
}

setInterval(updateServerStatuses, 50000);

// Zoom inicial
setTimeout(() => zoomToFit(), 500);

// Auto-refresh completo cada 5 minutos
setInterval(() => location.reload(), 300000);
</script>
